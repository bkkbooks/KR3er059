body:
  text: 卷之二脹滿蠱脹第十二水腫參看脹為病辨實虛脹者脹之於內也虛脹誤攻則壞實脹誤補則增氣驟滯七氣疏七氣湯能疏通滯氣滿拒按七物祛腹滿拒按宜金匱厚朴七物湯即桂枝湯小承氣湯合用以兩解表裡之實邪也脹閉痛三物鋤腹滿而痛若大便實者宜金匱厚朴三物湯行氣中兼蕩實法以鋤其病根以上言實脹之治法若虛脹且躊躇仔細診視勿輕下藥中央健四旁如喻嘉言云執中央以運四旁千古格言參竺典大地輿單腹脹實難除四肢不腫而腹大如鼓山風卦指南車易中旨費居諸暑症第十三傷暑症動靜商夏月傷暑分動靜者說本東垣動而得熱為殃得於長途赤日身熱如焚面垢體倦口渴脈洪而弱六一散白虎湯六一散治一切暑症白虎湯加人參者以大汗不止暑傷元氣也加蒼朮者治身熱足冷以暑必挾濕也靜而得起貪涼處於高廈深室畏熱貪涼受陰暑之氣惡寒象熱逾常惡寒與傷寒同而發熱較傷寒倍盛心煩辨切莫忘雖同傷寒而心煩以別之且傷寒脈盛傷暑脈虛香薷飲有專長香薷發汗利水為暑症之專藥也有謂夏月不可用香薷則香薷將用於何時也大順散從症方此治暑天畏熱貪涼成病非治暑也此舍時從症之方生脈散久服康此夏月常服之劑非治病方也東坦法防氣傷暑傷元氣藥宜從補東垣清暑益氣湯頗超雜說起道弗彰以上皆諸家之臆說而先聖之道反為之晦若行道人不可不熟記之以資顧問若精蘊祖仲師仲景傷寒論金匱要略痙濕暍篇字字皆精義奧蘊太陽病旨在茲仲師謂太陽中暍太陽二字大眼目也因人俱認為熱邪故提出太陽二字以喝醒之寒暑皆為外邪中於陽而陽氣盛則寒亦為熱中於陽而陽氣虛則暑亦為寒若中於陰無分寒暑皆為陰症如酷暑炎熱並無寒邪反多陰症總之邪之中人隨人身之六氣陰陽虛實而旋轉變化非必傷寒為陰中暑為陽也經脈辨標本歧師云太陽中暍發熱者病太陽而得標陽之氣也惡寒者病太陽而得本寒之氣也身重而疼痛者病太陽通體之經也脈弦細芤遲者病太陽通體之脈也小便已灑灑然毛聳手足逆冷者病太陽本寒之氣不得陽熱之化也小有勞身即熱口開前板齒燥者病太陽標陽之化不得陰液之滋也此太陽中暍標本經脈皆病治當助其標本益其經脈若妄施汗下溫針則誤矣臨症辨法外思愚按借用麻杏石甘湯治中暑頭痛汗出氣喘口渴之外症黃連阿膠雞子黃湯治心煩不得臥之內症至柴胡梔子承氣等湯俱可取用師云渴者與豬苓湯又云瘀熱在裡用麻連軺豆湯育陰利濕俱從小便而出此法外之法神而明之存乎其人焉方兩出大神奇暑之中人隨人之陰陽虛實為旋轉變化如陽臟多火暑即寓於火之中為汗出而煩渴師有白虎加人參之法如陰臟多濕暑即伏於濕之內為身熱疼重脈微弱師以夏月傷冷水水行皮膚所致指暑病以濕為病治以一物瓜蒂湯令水去而濕無所依而亦解也泄瀉第十四濕氣勝五瀉成書云濕成五泄胃苓散厥功宏胃苓散暖脾平胃利水為泄瀉之要方濕而冷萸附行胃苓散加吳茱萸附子之類腹痛加木香濕而熱連芩程胃苓散加黃芩黃連熱甚去桂枝加葛根濕挾積曲楂迎食積加山楂神麯酒積加葛根虛兼濕參附苓胃苓散加人參附子之類脾腎瀉近天明五鼓以後瀉者腎虛也瀉有定時者土主信脾虛也故名脾腎瀉四神服勿紛更四神丸加白朮人參乾薑附子茯苓罌粟殼之類為丸久服方效恆法外內經精照此法治而不愈者宜求之內經腸臟說得其情腸熱臟寒腸寒臟熱內經精義張石頑頗得其解瀉心類特丁寧諸瀉心湯張石頑俱借來治瀉與內經之旨頗合詳載醫學從衆録眩暈第十五眩暈症皆屬肝內經云諸風掉眩皆屬於肝肝風木相火干厥陰為風木之臟厥陰風木為少陽相火所居風火動兩動摶風與火皆屬陽而主動兩動相摶則為旋轉頭旋轉眼紛繁此二句寫眩暈之象也虛痰火各分觀仲景主痰飲丹溪宗河間之說謂無痰不眩無火不暈內經云精虛則眩又云腎虛則頭重高搖髓海不足則腦轉耳鳴諸說不同如此究其指總一般究其殊途同歸之旨木動則生風風生而火發故河間以風火立論也風生必挾木勢而剋土土病則聚液而成痰故仲景以痰飲立論丹溪以痰火立論也究之腎為肝母腎主藏精精虛則腦空腦空則旋轉而耳鳴故內經以精虛及髓海不足立論也言虛者言其病根言實者言其病象其實一以貫之也痰火亢大黃安寸脈滑按之益堅者為上實丹溪用大黃一味酒炒三遍為末茶調下一二錢上虛甚鹿茸餐寸脈大按之即散者為上虛宜鹿茸酒鹿茸生於頭取其以類相從且入督脈而通於腦每用半兩酒煎去滓入麝香少許服或用補中益氣湯及耆朮膏之類此症如鉤藤天麻菊花之類俱可為使欲下取求其端端頭也謂尋到源頭也欲榮其上必灌其根古人有上病下取法左歸飲正元丹左歸飲加肉蓯蓉川芎細辛甚效正元丹亦妙嘔噦吐第十六厄逆附嘔吐噦皆屬胃嘔字從漚漚者水也口中出水而無食也吐字從土土者食也口中吐食而無水也嘔吐者水與食並出也噦者口中有穢味也又謂之乾嘔口中有穢味未有不幹嘔也厄逆者氣衝有聲聲短而頻也其病皆屬於胃二陳加時醫貴二陳湯倍生薑安胃降逆藥也寒加丁香砂仁若熱加黃連鮮竹茹石斛之類玉函經難倣佛寒熱攻補一定不移小柴胡少陽謂寒熱往來而嘔者屬少陽也吳茱萸平酸味吳茱萸湯治陽明食谷欲嘔者又治少陰症吐利手足逆冷煩躁欲死者又治乾嘔吐涎沫者此症嘔吐多有酸味食已吐胃熱沸食已即吐其人胃素有熱食復入兩熱相沖不得停留黃草湯下其氣大黃甘草湯治食已即吐金匱云欲吐者不可下之又云食已即吐者大黃甘草湯下之何也曰病在上而欲吐宜因而越之若逆之使下則必憒亂益甚若既吐矣吐而不已是有升無降當逆折之食不入火堪畏王太僕云食不得入是有火也黃連湯為經緯喻嘉言用進退黃連湯柯韻伯用乾薑黃連黃芩人參湯推之瀉心湯亦可借用以此數湯為經緯若厄逆代赭匯代赭旋覆湯治噫氣即治厄逆若久病厄逆為胃氣將絶用人參一兩乾薑附子各三錢丁香柿蒂各一錢可救十中之一癲狂癇第十七重陽狂重陰癲內經云重陽者狂重陰者癲靜陰象動陽宣癲者笑哭無時語言無序其人常靜狂者詈罵不避親疏其人常動狂多實痰宜蠲蠲除頑痰滾痰丸加烏梅硃砂治之生鐵落飲當歸承氣湯亦妙癲虛發石補天磁朱丸是煉石補天手法駱氏內經拾遺用溫膽湯忽搐搦癇病然手足抽掣猝倒無知忽作忽止病有間斷故名曰癇五畜狀吐痰涎肺如犬吠肝如羊嘶心如馬鳴脾如牛吼腎如豬叫每發必口角流涎有生病歷歲年由母腹中受驚積久失調一觸而發病起於有生之初非年來之新病也內經拾遺用溫膽湯柯韻伯用磁朱丸火氣亢蘆薈平火氣亢必以大苦大寒之劑以降之宜當歸蘆薈丸痰積痼丹礬穿丹礬丸能穿入心胞絡導其痰涎從大便而出然不如磁朱丸之妥當三症本厥陰愆以上治法時醫習用而不效者未知其本在於厥陰也厥陰屬風木與少陽相火同居厥陰之氣逆則諸氣皆逆氣逆則火發火發則風生風生則挾木勢而害土土病則聚液而成痰痰成必歸迸入心為以上諸症體用變標本遷其本陰其體熱伏所主所因先伏其所主先其所因收散互逆從連或收或散或逆或從隨所利而行之和中氣妙轉旋調其中氣使之和平自伏所主至此其小注俱內經本文轉旋言心手靈活也其要旨在調其中氣二句中氣者土氣也治肝不應當取陽明制其侮也悟到此治立痊症雖可治而任之不專亦無如之何矣五淋癃閉赤白濁遺精第十八五淋病皆熱結淋者小便痛澀淋瀝欲去不去欲止不止是也皆熱氣結於膀胱膏石勞氣與血石淋下如沙石膏淋下如膏脂勞淋從勞力而得氣淋氣滯不通臍下悶痛血淋瘀血停蓄莖中割痛五淋湯是祕訣石淋以此湯煎送發灰滑石石首魚頭內石研末膏淋合萆薢分清飲氣淋加荊芥香附生麥芽不愈再加升麻或用吐法勞淋合補中益氣湯血淋加牛膝鬱金桃仁入麝香少許溫服敗精淋加味啜過服金石藥與老人陽已痿思色以降其精以致內敗而為淋宜前湯加萆薢石菖蒲菟絲子以導之外冷淋腎氣咽五淋之外又有冷淋其症外候惡冷喜飲熱湯宜加味腎氣丸以鹽湯咽下點滴無名癃閉小便點滴不通與五淋之短縮不同氣道調江河決前湯加化氣之藥或吞滋腎丸多效孟子云若決江河沛然莫之能御也引來喻小便之多也上竅通下竅泄如滴水之器閉其上而倒懸之點滴不能下也去其上閉而水自通宜服補中益氣湯再服以手探吐外竅開水源鑿又法啓其外竅即以開其內竅麻黃力猛能通陽氣於至陰之地下肺氣主皮毛配杏仁以降氣下達州都導水必自高原之義也以前飲加此二味甚效夏月不敢用麻黃以蘇葉防風杏仁等分水煎服溫覆微汗水即利矣虛人以人參麻黃各一兩水煎服神效分利多醫便錯愈利愈閉矣濁又殊竅道別淋出溺竅濁出精竅前飲投精愈涸水愈利而腎愈虛矣腎套談理脾恪治濁只用腎家套藥不效蓋以脾主土土病濕熱下注則小水渾濁濕勝於熱則為白濁熱勝於濕則為赤濁濕熱去則濁者清矣分清飲佐黃柏萆薢分清飲加蒼朮白朮再加黃柏苦以燥濕寒以除熱心腎方隨補綴六八味湯丸加龍牡腎藥也四君子湯加遠志心藥也心腎之藥與前飲間服若遺精另有設與濁病又殊有夢遺龍膽折有夢而遺相火旺也余每以龍膽瀉肝湯送下五倍子丸二錢多效張石頑云肝熱則火淫於內魂不內守故多淫夢失精又云多是陰虛陽擾其作必在黎明陽氣發動之時可以悟矣妙香散甚佳無夢遺十全設無夢而遺是氣虛不能攝精宜十全大補湯加龍骨牡蠣蓮鬚五味子黃柏為丸常服坎離交亦不切時醫遇此症便云心腎不交用茯神遠志蓮子棗仁之類未中病情皆不切之套方也疝氣第十九疝任病歸厥陰經云任脈為病外結七疝女子帶下瘕聚丹溪專治厥陰者以肝主筋又主痛也寒筋水氣血尋寒疝水疝筋疝氣疝血疝狐出入㿉頑麻狐疝臥則入腹立則出腹㿉疝大如升斗頑麻不痛專治氣景嶽針景嶽云疝而曰氣者病在氣也寒有寒氣熱有熱氣濕有濕氣逆有逆氣俱當兼用氣藥也五苓散加減斟別録以此方加川楝子木通橘核木香通治諸疝茴香料著醫林三層茴香丸治久疝雖三十年之久大如栲栳皆可消散痛不已須洗淋陰腫核中痛千金翼用雄黃一兩礬石二兩甘草一尺水一斗煮二升洗之如神痰飲第二十痰飲源水氣作水氣上逆得陽煎熬則稠而成痰得陰凝聚則稀而成飲然水歸於腎而受制於脾治者必以脾腎為主燥濕分治痰略方書支離不可聽只以燥濕為辨燥痰宜潤肺濕痰宜溫脾握要之法也宜參之虛癆咳嗽等篇或老痰宜王節齊化痰丸實痰怪症宜滾痰丸之類四飲名宜斟酌金匱云其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲注即今之久咳痰喘是也飲後水流在脅下咳唾引痛謂之懸飲注即今之停飲脅痛症也飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲注即今之風水水腫症也咳逆倚息氣短不得臥其形如腫謂之支飲注今之停飲喘滿不得臥症也又支飲偏而不中正也參五臟細量度四飲猶未盡飲邪之為病也凡五臟有偏虛之處而飲留之言臟不及腑者腑屬陽在腑則行矣金匱曰水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸補和攻視強弱宜補宜攻宜和視乎病情亦視乎人之本體強弱而施治也十六方各鑿鑿苓桂朮甘湯腎氣丸甘遂半夏湯十棗湯大青龍湯小青龍湯木防己湯木防己加茯苓芒硝湯澤瀉湯厚朴大黃湯葶藶大棗瀉肺湯小半夏湯己椒葶藶丸小半夏加茯苓湯五苓散外臺茯苓飲溫藥和博返約金匱云病痰飲者當以溫藥和之忽揭出溫藥和之四字即金針之度也蓋痰飲水病也水歸於腎而受制於脾欲水由地中行而歸其壑者非用溫藥以化氣不可也欲水不泛溢而築以堤防者非用溫藥以補脾不可也如苓桂朮甘湯腎氣丸小半夏湯五苓散之類皆溫藥也即如十棗湯之十枚大棗甘遂半夏湯之半升白蜜木防己湯之參桂葶藶湯之大棗亦寓溫和之意至於攻下之法不過一時之權宜而始終不可離溫藥之旨也陰霾除陽光灼飲為陰邪必使離照當空而群陰方能退散余每用參苓朮附加生薑汁之類取效滋潤流時醫錯方中若雜以地黃麥冬五味附和其陰則陰霾沖逆肆空飲邪滔天莫救矣即腎氣丸亦宜慎用真武湯水歸壑方中以茯苓之淡以導之白朮之燥以制之生薑之辛以行之白芍之苦以泄之得附子本經之藥領之以歸其壑白散方窺祕鑰三因白散之妙喻嘉言解之甚詳見於醫門法律中風門消渴第二十一消渴症津液干口渴不止為上消治以人參白虎湯食入即飢為中消治以調胃承氣湯飲一溲一小便如膏為下消治以腎氣丸其實皆津液干之病也趙養葵變其法七味飲一服安趙養葵云治消症無分上中下但見大渴大燥須六味丸料一斤肉桂一兩五味子一兩水煎六七碗恣意冷飲之睡熟而渴如失矣白虎承氣湯皆非所治也金匱法別三般能食而渴者重在二陽論治以手太陽主津液足太陽主血也飲一溲一者重在少陰論治以腎氣虛不能收攝則水直下趨腎氣虛不能蒸動則水不能上濟也不能食而氣衝者重在厥陰論治以一身中唯肝火最橫燔灼無忌耗傷津液而為消渴也金匱論消渴開口即揭此旨以補內經之未及不必疑其錯簡也二陽病治多端勞傷榮衛漸鬱而為熱者炙甘草湯可用喻嘉言清燥湯即此湯變甘溫為甘寒之用也熱氣蒸胸者人參白虎湯可用金匱麥門冬湯即此湯變甘寒而為甘平之用也消穀大堅者麻仁丸加甘草人參當歸可用妙在滋液之中攻其堅也蓋堅則不能消水如以水投石水去而石自若也消症屬火內郁之火本足以消水所飲之水本足以濟渴只緣胃中堅燥全不受水之浸潤轉從火熱之勢急走膀胱故小便愈數而愈堅愈堅而愈消矣此論本喻嘉言最精少陰病腎氣寒飲水多小便少名上消食谷多而大便堅名食消亦名中消上中二消屬熱唯下消症飲一溲一中無火化可知腎氣之寒也故用腎氣丸厥陰症烏梅丸方中甘辛苦酸並用甘以緩之所以遂肝之志也辛以散之所以悅肝之神也苦以降之則逆上之火順而下行矣酸以收之以還其曲直作酸之本性則率性而行所無事矣故此丸為厥陰症之總劑治此症除此丸外皆不用苦藥恐苦從火化也變通妙燥熱餐有脾不能為胃行其津液肺不能通調水道而為消渴者人但知以清潤治之而不知脾喜燥而肺惡寒試觀泄瀉者必渴此因水津不能上輸而惟下泄故爾以燥脾之藥治之水液上升即不渴矣余每用理中丸湯倍白朮加栝蔞根神效傷寒瘟疫第二十二傷寒病極變遷太陽主一身之表司寒水之經凡病自外來者皆謂傷寒非寒熱之變也變遷者或三陽或三陰或寒化或熱化及轉屬合併之異六經法有真傳太陽寒水其經主表編中備發汗諸法陽明燥金其經主裡編中備攻裡諸法少陽相火其經居表裡之界所謂陽樞也編中備和解諸法太陰濕土純陰而主寒編中備溫補諸法少陰君火標本寒熱不同所謂陰樞也編中寒熱二法並立厥陰風木木中有火而主熱編中備清火諸法雖太陽亦有里症陽明亦有表症太陰亦有熱症厥陰亦有寒症而提綱卻不在此也頭項病太陽編三陽俱主表而太陽為表中之表也論以頭痛項強發熱惡寒為提綱有汗宜桂枝湯無汗宜麻黃湯胃家實陽明編陽明為表中之裡主裡實症宜三承氣湯論以胃家實為提綱又鼻乾目痛不眠為經病若惡寒頭痛為未離太陽審其有汗無汗用桂枝麻黃法無頭痛惡寒但見壯熱自汗口渴為已離太陽宜白虎湯仲景提綱不以此者凡解表諸法求之太陽攻裡諸法求之陽明立法之嚴也眩苦嘔少陽編少陽居太陽陽明之界謂之陽樞寒熱相雜若寒熱往來於外為胸脅滿煩宜大小柴胡湯若寒熱互搏於中嘔吐腹痛宜黃連湯痞滿嘔逆宜半夏瀉心湯拒格食不入宜乾薑黃連人參湯若邪全入於膽府下攻於脾為自利宜黃芩湯上逆於胃利又兼嘔宜黃芩加半夏生薑湯論以口苦咽乾目眩為提綱吐利痛太陰編太陰濕土為純陰之臟從寒化者多從熱化者少此經主寒症而言宜理中湯四逆湯為主第原本為王叔和所亂耳論以腹中滿吐食自利不渴手足自溫腹時痛為提綱但欲寐少陰編少陰居太陰厥陰之界謂之陰樞有寒有熱論以脈微細但欲寐為提綱寒用麻黃附子細辛湯麻黃附子甘草湯及白通湯通脈四逆湯熱用豬苓湯黃連雞子黃湯及大承氣湯諸法吐蛔渴厥陰編厥陰陰之盡也陰盡陽生且屬風木木中有火主熱症而言論以消渴氣上衝心心中疼熱飢不欲食食則吐蛔下之利不止為提綱烏梅丸主之自利下重飲水者白頭翁湯主之凡一切宜發表法備之太陽一切宜攻裡法備之陽明一切宜和解法備之少陽一切宜溫補法備之太陰一切宜寒涼法備之厥陰一切寒熱兼用法備之少陰此仲景傷寒論之六經與內經熱病論之六經不同也長沙論嘆高堅仰之彌高鑽之彌堅存津液是真詮存津液是全書宗旨善讀書者讀於無字處如桂枝湯甘溫以解肌養液也即麻黃湯直入皮毛不加姜之辛熱棗之甘壅從外治外不傷營氣亦養液也承氣湯急下之不使邪火灼陰亦養液也即麻黃附子細辛湯用附子以固少陰之根令津液內守不隨汗渙亦養液也麻黃附子甘草湯以甘草易細辛緩麻黃於中焦取水穀之津而為汗毫不傷陰更養液也推之理中湯五苓散必啜粥飲小柴胡湯吳茱萸湯皆用人參何一而非養液之法乎汗吐下溫清懸在表宜汗在胸膈宜吐在裡宜下寒者溫之熱者清之補貴當方而圓虛則補之合上為六法曰方而圓者言一部傷寒論全是活法規矩廢甚於今自王叔和而後注家多誤然亦是非參半今則不知傷寒論為何物規矩盡廢矣二陳尚九味尋人皆曰二陳湯為發汗平穩之劑而不知茯苓之滲半夏之澀皆能留邪生熱變成譫語不便等症人皆曰九味羌活湯視麻桂二湯較妥而不知太陽病重須防侵入少陰此方中有芩地之苦寒服之不汗恐苦寒陷入少陰變成脈沉細但欲寐之症服之得汗恐苦寒戕伐腎陽陽虛不能內固變成遂漏不止之症時醫喜用此方其亦知此方之流弊害人匪淺也香蘇外平胃臨香蘇飲力量太薄不能驅邪盡出恐餘邪之傳變多端平胃散為燥濕消導之劑仲景從無燥藥發汗之法且外邪未去更無先攻其內法汗源涸耗真陰陰者陽之家也桂枝湯之芍藥及啜粥俱是滋陰以救汗源麻黃湯之用甘草與不啜粥亦是保陰以救汗源景嶽誤認其旨每用歸地貽害不少邪傳變病日深治之得法無不即愈若逆症壞症過經不愈之症皆誤治所致也目擊者實痛心人之死於病者少死於藥者多今行道人先學利口以此藥殺人即以此藥得名是可慨也醫醫法腦後針聞前輩云醫人先當醫醫以一醫而治千萬人不過千萬人計耳救一醫便救千萬人救千萬醫便救天下後世無量恆河沙數人耳余所以於醫者腦後痛下一針若瘟疫治相侔四時不正之氣及方土異氣病人穢氣感而成病則為瘟疫雖有從經絡入從口鼻入之分而見證亦以六經為據與傷寒同通聖散兩解求仲師於太陽條獨挈出發熱不惡寒而渴為溫病是遵內經人傷於寒則為熱病冬傷於寒春必病溫先夏至日為病溫後夏至日為病暑之三說也初時用麻杏甘石湯在經用白虎加人參湯入里用承氣湯及陽明之茵陳蒿湯少陰之黃連阿膠湯豬苓湯厥陰之白頭翁湯等皆其要藥究與瘟疫之病不同也瘟疫之病皆新感乖戾之氣而發初起若兼惡寒者邪從經絡入用人參敗毒散為匡正托邪法初起若兼胸滿口吐黃涎者邪從口鼻入用藿香正氣散為辛香解穢法唯防風通聖散面面周到即初起未必內實而方中之硝黃別有妙用從無陷邪之害若讀仲師書死於句下者聞之無不咋舌而不知其有利無弊也六法備汗為尤汗吐下溫清補為治傷寒之六法六法中唯取汗為要以瘟疫得汗則生不得汗則死汗期以七日為準如七日無汗再俟七日以汗之又參論中聖法以吐之下之溫之清之補之皆所以求其汗也詳於時方妙用中達原飲昧其由吳又可謂病在膜原以達原飲為方創異說以欺人實昧其病由也司命者勿逐流醫為人之司命熟讀仲聖書而兼臨症之多者自有定識切不可隨波逐流婦人經産雜病第二十三婦人病四物良與男子同唯經前産後異耳濟陰綱目以四物湯加香附炙草為主凡經前産後俱以此出入加減月信准體自康經水一月一至不愆其期故名月信經調則體自康漸早至藥宜涼血海有熱也宜加味四物湯加續斷地榆黃芩黃連之類漸遲至重桂姜血海有寒也宜加味四物湯加乾薑肉桂之類甚加附子錯雜至氣血傷經來或早或遲不一者氣血虛而經亂也宜前湯加人參白朮黃耆之類歸脾法主二陽內經云二陽之病發心脾有不得隱曲為女子不月宜歸脾湯兼鬱結逍遙長鬱氣傷肝思慮傷脾宜加味逍遙散種子者即此詳種子必調經以歸脾湯治其源以逍遙散治其流並以上諸法皆妙不必他求唯婦人體肥厚者恐子宮脂滿另用二陳湯加川芎香附為丸經閉塞禁地黃閉寒脈實小腹脹痛與二陽病為女子不月者不同雖四物湯為婦科所不禁而經閉及積瘀實症宜去地黃之濡滯恐其護蓄血不行也加醋炒大黃二錢桂一錢桃仁二錢服五六劑孕三月六君嘗得孕三月之內多有嘔吐不食名惡阻宜六君子湯俗疑半夏礙胎而不知仲師慣用之妙品也高鼓峰云半夏合參朮為安胎止嘔進食之上藥安胎法寒熱商四物湯去川芎為主熱加黃芩白朮續斷寒加艾葉阿膠杜仲白朮大抵胎氣不安虛寒者多庸醫以胎火二字惑人誤人無算難産者保生方橫生倒産漿水太早交骨不開等症宜保生無憂散開交骨歸芎鄉交骨不開陰虛故也宜加味芎歸湯血大下補血湯胎猶舟也血猶水也水滿則舟浮血下太早則乾涸而胎阻矣宜當歸補血湯加附子三錢欲氣旺則血可速生且欲氣旺而推送有力加附子者取其性急加酒所以速耆歸之用也保生無憂散治漿水未行此方治漿水過多加味歸芎湯治交骨不開三方鼎峙不可不知腳小指艾火煬張文仲治婦人橫産手先出諸般符藥不效以艾火如小麥大灸産婦右腳小指頭尖下火立産胎衣阻失笑匡胎衣不下宜以醋湯送失笑散三錢即下産後病生化將時醫相傳云生化湯加減治産後百病若非由於停瘀而誤用之則外邪反入於血室中氣反因以受傷危症蜂起矣慎之慎之合諸說俱平常以上相沿之套法輕病可愈治重病則不效資顧問亦勿忘商治時不與衆醫談到此法反為其所笑精而密長沙室金匱要略第二十卷第二十一卷第二十二卷義精而法密妊娠篇丸散七妊娠篇凡十方丸散居七湯居三蓋以湯者蕩也妊娠以安胎為主攻補俱不宜驟故緩以圖之即此是法桂枝湯列第一此湯表症得之為解肌和營衛內症得之為化氣調陰陽今人只知為傷寒首方此於妊娠篇列為第一方以喝醒千百庸醫之夢亦即是法師云婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之注陰搏陽別為有子今反云陰脈弱小是孕只兩月蝕下焦之氣不能作盛勢也過此則不然妊娠初得上下本無病因子室有凝氣溢上下故但以芍藥一味固其陰氣使不得上溢以桂薑甘棗扶上焦之陽而和其胃氣但令上焦之陽氣充能御相侵之陰氣足矣未嘗治病正所以治病也附半姜功超軼時醫以半夏附子墜胎不用乾薑亦疑其熱而罕用之而不知附子補命門之火以保胎半夏和胃氣以安胎乾薑暖土臟使胎易長俗子不知內十方皆法律桂枝湯治妊娠附子湯治腹痛少腹如扇茯苓桂枝丸治三月餘漏下動在臍上為癥瘕當歸芍藥散治懷妊腹中㽲痛乾薑人參半夏丸治妊娠嘔吐不止當歸貝母苦參丸治妊娠小便難當歸散妊娠常服白朮散妊娠養胎方方超妙用之如神惟妊娠有水氣身重小便不利惡寒起即頭眩用葵子茯苓散不能無疑産後篇有神術共九方小柴胡首特筆妊娠以桂枝湯為第一方産後以小柴胡湯為第一方即此是法新産婦人有三病一者病痙二者病鬱冒三者大便難産婦鬱冒脈微弱嘔不能食大便反堅但頭汗出者以小柴胡湯主之竹葉湯風痙疾金匱云産後中風發熱面正赤喘而頭痛竹葉湯主之錢院使注云中風之下當有病痙者三字按庸醫於此症以生化湯加薑桂荊芥益母草之類殺人無算陽旦湯功與匹即桂枝湯增桂加附子活人以桂枝湯加黃芩者誤也風乘火勢火借風威灼筋而成痙宜竹葉湯若數日之久惡寒症尚在則為寒風宜此湯二湯為一熱一寒之對子師云産後風續續數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在者可與陽旦湯腹痛條須詳悉此下八句皆言腹痛不同用方各異羊肉湯㽲痛謐㽲痛者痛之緩也為虛症痛滿煩求枳實滿煩不得臥裡實也宜枳實芍藥散二味無奇妙在以麥粥下之著臍痛下瘀吉腹中有瘀血著於臍下而痛宜下瘀血湯痛而煩裡熱窒小腹痛雖為停瘀而不大便日晡煩躁譫語非停瘀專症也血因熱裹而不行非血自結於下但攻其瘀而可愈也金匱以大承氣湯攻熱攻涼施毋固必攻有大承氣湯涼有竹皮大丸白頭翁加甘草阿膠湯金匱云病解能食七八日更發熱者此為胃實大承氣湯主之又云婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之又云産後下利虛極白頭翁加甘草阿膠湯主之讀此則知丹溪産後以大補氣血為主余以末治之說為大謬也雜病門還熟讀金匱云婦人之病以因虛積冷結氣六字為綱至末段謂千變萬端總出於陰陽虛實而獨以弦緊為言者以經阻之始大概屬寒氣結則為弦寒甚則為緊以此為主而參之兼脈可也二十方效俱速隨證詳難悉録唯溫經帶下服十二癥九痛七害五傷三痼共三十六種因經致病統名曰帶下言病在帶脈非近時赤白帶下之說也溫經湯治婦人年五十前陰下血暮發熱手掌煩熱腹痛口乾云云其功實不止此也甘麥湯臟躁服金匱云婦人臟躁悲傷欲哭象如神靈所作數缺伸甘麥大棗湯主之藥到咽效可卜閩中諸醫因余用此數方奇效每繕録於讀本之後亦醫風之將轉也餘日望之道中人須造福小兒第二十四小兒病多傷寒喻嘉言曰方書謂小兒八歲以前無傷寒此胡言也小兒不耐傷寒初傳太陽一經早已身強多汗筋脈牽動人事昏沉勢已極於本經誤藥即死無由見其傳經所以謂其無傷寒也俗云驚風皆是稚陽體邪易干時醫以稚陽為純陽生死關頭開手便錯凡發熱太陽觀太陽主身之表小兒腠理未密最易受邪其症頭痛項強發熱惡寒等小兒不能自明唯發熱一捫可見熱未已變多端喻嘉言曰以其頭搖手動也而立抽掣之名以其卒口噤腳攣急也而立目斜心亂搐搦之名以其脊強背反也而立角弓反張之名造出種種不通名目謂為驚風而用攻痰鎮驚清熱之藥投之立死矣不知太陽之脈起於目內眥上額交巔入腦還出別下項夾脊抵腰中是以見上諸症當時若以桂枝湯照法服之則無餘事矣過此失治則變為痙症無汗用桂枝加葛根湯有汗用桂枝加栝蔞根湯此太陽而兼陽明之治也抑或寒熱往來多嘔以桂枝湯合小柴胡湯或單用小柴胡湯此太陽而兼少陽之治也太陽外仔細看喻嘉言云三日即愈為貴若待經盡方解必不能耐矣然亦有耐得去而傳他經者亦有即時見他經之症者宜細認之遵法治危而安遵六經提綱之法而求之詳於傷寒論若吐瀉求太陰太陰病以吐食自利不渴手足自溫腹時痛為提綱以理中湯主之吐瀉甚變風淫吐瀉不止則土虛而木邪乘之左傳云風淫末疾末四肢之末也即抽掣攣急之象慢脾說即此尋世謂慢脾風多死而不知即太陰傷寒也有初時即傷於太陰者有漸次傳入太陰者有誤用神麯麥芽山楂蘿蔔子枳殼葶藶大黃栝蔞膽南星等藥陷入太陰者既入太陰其治同也如吐瀉後冷汗不止手足厥逆理中湯加入附子或通脈四逆湯白通湯佐之此太陰而兼少陰之治也如吐瀉手足厥冷煩躁欲死不吐食而吐涎沫服理中湯不應宜吳茱萸湯佐之此太陰而兼厥陰之治也若三陰熱化之證如太陰腹時痛時止用桂枝加芍藥湯大便實而痛用桂枝加大黃湯少陰之咳而嘔渴心煩不得眠宜豬苓湯心中煩不得臥宜黃連阿膠湯厥陰之消渴氣衝吐蛔下利宜烏梅丸下利後重喜飲水用白頭翁湯等症亦間有之熟傷寒論者自知而提綱不在此也陰陽證二太擒三陽獨取太陽三陰獨取太陰擒賊先擒王之手段也太陽陽明少陽為三陽太陰少陰厥陰為三陰千古祕理蘊深喻嘉言通禪理後得異人所授獨得千古之祕胡卣臣曰習幼科者能虛心領會便可免乎殃咎若駭為異說則造孽無極矣即痘疹此傳心痘為先天之毒伏於命門因感外邪而發初起時用桂枝湯等從太陽以化其氣氣化則毒不留自無一切鬱熱諸症何用服連翹紫草牛蒡生地犀角石膏芩連諸藥以致寒中變症乎及報點已齊後冀其漿滿易於結痂而愈當求之太陰用理中湯等補中宮土氣以為成漿脫痂之本亦不賴保元湯及鹿茸人乳糯米桂圓之力也若用毒藥取漿先損中宮土氣漿何由成誤人不少此古今痘書所未言唯張隱菴侶山堂類辨微露其機於言外殆重其道而不敢輕泄歟疹症視痘症稍輕亦須知此法高士宗醫學真傳有桂枝湯加金銀花紫草法誰同志度金針附敷藥拔風害人說金匱云人得風氣以生長此一語最精風即氣也人在風中而不見風猶魚在水中而不見水鼻息出入頃刻離風即死但風靜即為養人之和風風動即為殺人之邪風若大人之中風小兒之驚風卒倒搐掣角弓反張目上視口流涎皆風動之象即氣之乖也醫者宜化邪風為和風即所以除邪氣而匡正氣閩中市醫遇小兒諸病及驚癇危症以萆麻子巴豆南星萊蔔子全蠍大黃急性子皂角為末加樗皮冰片麝香以麻油或白蜜或薑蔥汁調敷於囟門以及胸中臍中足心為拔風法祕其方以射利十敷十死既死而仍不歸怨之者以為外敷之法不妨姑試俟未效而即去之似不為害而不知一敷之後元氣為其拔散即揭去其藥而既散之氣永不能使之復聚矣況囟門為元陽之會胸中為宗氣之宅臍中為性命之根足心為腎脈之本皆不可輕動昔人以附子海狗腎補藥敷於臍中而蒸之名醫猶且戒其勿用況大傷人之物乎凡以保赤為心者宜共攻此法而又有惑於急驚慢驚食積之說預用羌活獨活防風秦艽前胡赤芍鉤藤鉤荊芥天麻厚朴神麯山楂蒼朮膽星葶藶子蘿蔔子貝母牛黃硃砂天竺黃枳殼杏仁石菖蒲甘草或合為一方或分為二三方者亦五十步笑百步耳
