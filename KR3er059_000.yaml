body:
  text: 附録陰陽識一字便可為醫説客有問於余曰醫之為道乃古聖人泄天地之祕奪造化之權起死回生非讀破萬卷書參透事事物物之理者不能今非通儒而業此亦能療人病獲盛名何也余曰天地間有理有數理可勝數則有學問之醫遠近崇之遂得以盡其活人之道然仲景為醫中之聖尚未見許於當時觀傷寒論之序文可見猶宣聖以素王老其身天之意在萬世不在一時也仲景之後名賢輩出類皆不得志於時閉門著書以為傳道之計而喻嘉言柯韻伯二先生書尤感憤而為不平之鳴此理數之可言而不可言者矣今之業醫者無論不足為通儒而求其識字者則為良醫矣無論其識多字也只求其識一字者亦可以為良醫矣客曰此何字也得毋所謂丁字乎余曰亦其類耳不必他求即人字是也人乃陰精陽氣合而成之者也左為陽左邊一丿陽之位也右為陰右邊一乀陰之位也作書者遇丿處自然輕手揮之陽主乎氣輕清之象也遇乀處自然重手頓之陰主乎精重濁之象也兩畫不相離陰陽互根之道也兩畫各自位置陰陽對待之道也丿在左者不可使之右乀在右者不可使之左陰陽不離之道也左丿由重而輕萬物生於水即男女媾精萬物化生之義由陰而陽也右乀由輕而重形生於氣即大哉乾元乃通統天至哉坤元乃順承天之義陽統乎陰也二者合之則成人合之之義醫書謂之曰抱周易名之曰交交則為泰矣試以形景淺言之人之鼻下口上水溝穴一名人中取人身居乎天地中之義也天氣通於鼻地氣通於口天食人以五氣鼻受之地食人以五味口受之穴居其中故曰人中自人中而上目鼻耳皆兩竅偶畫自人中而下口與二便皆單竅奇畫上三畫偶而為陰下三畫奇而為陽取天地之義合成泰卦也形景主外猶必合陰陽之象而成人況人之所以生之理乎人之為義大矣哉子若遇醫者問此一字恐高車駟馬詡詡以名醫自負者亦一字不識也客聞豫言亦大笑而去臟腑十二官靈蘭祕典論云心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣按此以脾胃合為一官恐錯簡耳刺法補遺篇云脾者諫議之官知周出焉胃者倉廩之官五味出焉採此補入方足十二官之數心説心火臟身之主神明之舍也小篆嘗言心字篆文只是一倒火字耳蓋心火也不欲炎上故顛倒之以見調燮之妙也祝無功曰庖氏一畫直豎之則為丨左右倚之則為丿為乀縮之則為丶曲之則隱隱丶圓而神一丨丿乀方以直世間字變化浩繁未有能外一丨丿乀結構之者獨心字欲動欲流圓妙不居出之乎一丨丿乀之外更索一字與作對不得正以心者新也神明之官變化而日新也心主血脈血脈日新新新不停則為平人否則病矣其合脈也其榮色也開竅於舌肝説肝木臟魂所藏也肝者干也以其體狀有枝幹也又位於東方而主生氣時醫昧其理反云肝無補法宜涼宜伐只泥木剋土之一説而不知後天八卦配河圖之象三八為木居東即後天震巽之位巽上坤下則為觀易曰觀天之神道而四時不忒上坤下震則為復易曰復其見天地之心乎為義大矣哉其合筋也其榮爪也開竅於目脾説脾為土臟藏意與智居心肺之下故從卑又脾者裨也裨助胃氣以化谷也經云納穀者昌其在此乎其合肉也其榮唇也開竅於口肺説肺金臟魄所藏也肺者沛也中有二十四孔分布清濁之氣以行於諸臟使沛然莫御也內經曰肺惡寒又曰形寒飲冷則傷肺勿只守火剋金之一説也其合皮也其榮毛也開竅於鼻腎説腎水臟藏精與志華元化謂為性命之根也又腎者任也主骨而任周身之事故強弱系之甲乙經曰腎者引也能引氣通於骨髓卮言曰腎者神也妙萬物而言也其合骨也其榮發也開竅於二陰胃説胃屬土脾之腑也為倉廩之官五穀之府故從田田乃五穀所出以為五穀之市也又胃者衛也水穀入胃遊溢精氣上出於肺暢達四肢布護周身足以衛外而為固也膽説字從詹不從旦膽音檀乃口脂澤也與膽不同今從膽者乃傳襲之訛也膽屬木肝之腑也為中正之官中清之府十一經皆取決於膽人之勇怯邪正於此詹之故字從詹又膽者擔也有膽量方足以擔天下之事肝主仁仁者不忍故以膽斷膽附於肝之短葉間仁者必有勇也大腸小腸説大腸傳道之官變化出焉屬金為肺之腑小腸受盛之官化物出焉屬火為心之腑人納水穀脾氣化而上升腸則化而下降蓋以腸者暢也所以暢達胃中之氣也腸通暢則為平人否則病矣三焦説三焦者上中下三焦之氣也焦者熱也滿腔中熱氣布護能通調水道也為心包絡之腑屬火上焦不治則水泛高源中焦不治則水留中脘下焦不治則水亂二便三焦氣治則脈絡通而水道利故曰決瀆之官手心主説即心包絡心乃五臟六腑之主其包絡為君主之外衛相火代君主而行事也所以亦有主名何以系之以手蓋以手厥陰之脈出屬心包手三陽之脈散絡心包是手與心主合故心包絡稱手心主五臟加此一臟實六臟也膀胱説膀胱屬水為腎之腑經云膀胱者州都之官津液藏焉氣化則能出矣言其能得氣化而津液外出滋潤於皮毛也若水道之專司則在三焦之腑故經云三焦決瀆之官水道出焉言其熱氣布護使水道下出而為溺也內經兩出字一為外出一為下出千古罕明其旨茲特辨之又膀者旁也胱者光也言氣海之元氣足則津液旁達不窮而肌腠皮毛皆因以光滑也命門説越人指右腎為命門諸家非之余考內經太陽根於至陰結於命門命門者目也靈樞結根篇衛氣篇素問陰陽離合論三説俱同後讀黃庭經云上有黃庭下有關元後有幽門前有命門方悟其處凡人受生之初先天精氣聚於臍下當關元氣海之間其在女者可以手捫而得俗名産門其在男者於泄精之時自有關闌知覺此北門鎖鑰之司人之至命處也又考越人七衝門之説謂飛門唇也戶門齒也吸門會厭也賁門胃之上口也幽門大腸下口也闌門小腸下口也魄門肛門也便溺由氣化而出又增溺竅為氣門凡稱之曰門皆指出入之處而言也況身形未生之初父母交會之際男之施由此門而出女之受由此門而入及胎元既足復由此門而生故於八門之外重之曰命門也若夫督脈十四椎中有命門之穴是指外腧而言如五臟六腑腧一理非謂命門即在此也經絡經絡歌訣江訒庵本草備要後附此宜熟讀之無庸再著四診望色春夏秋冬長夏時青黃赤白黑隨宜左肝右肺形呈頰心額腎頤鼻主脾察位須知生者吉審時若遇克堪悲更於黯澤分新舊隱隱微黃是愈期又有辨舌之法舌上無苔為在表鮮紅為火淡白為寒主無苔言非謂苔之淡白也若有白苔為半表半裡黃苔為在裡黑苔病入少陰多死苔潤有液為寒苔燥無液為火舌上無苔如去油腰子為亡液不治聞聲肝怒聲呼心喜笑脾為思念發為歌肺金憂慮形為哭腎主呻吟恐亦多又法氣衰言微者為虛氣盛言厲者為實語言首尾不相顧者神昏狂言怒罵者實熱痰聲漉漉者死久病聞厄為胃絶大抵語言聲音以不異於平時者吉反者為凶問症出景嶽全書張心在增潤之一問寒熱二問汗三問頭身四問便五問飲食六問胸七聾八渴俱當辨九問舊病十問因再兼服藥參機變婦人尤必問經期遲速閉崩皆可見再添片語告兒科天花麻疹虔占驗切脈微茫指下最難知條緒尋來悟治絲舊訣以浮芤滑實弦緊洪為七表以沉微遲緩濡伏弱澀為八里以長短虛促結代牢動細為九道李瀕湖李士材加入數革散三脈共二十七字實難摸索必得其頭緒如治絲者始有條不紊三部分持成定法左寸外以候心內以候膻中右寸外以候肺內以候胸中左關外以候肝內以候鬲右關外以候胃內以候脾兩尺外以候腎內以候腹腹者大小二腸膀胱俱在其中前以候前後以候後上竟上者胸喉中事也下竟下者小腹腰股膝脛中事也此照內經分配之法八綱易見是良規浮主表沉主裡二脈於指下輕重辨之易見也遲主寒數主熱二脈以息之至數分之易見也大主邪實細主正虛二脈以形之闊窄分之易見也長主素盛短主素弱二脈以部之長短分之易見也以此八脈為綱其餘諸脈辨其兼見可也置而弗辨亦可也起四句總提切脈之大法也胃資水穀人根本脈屬肺而肺受氣於胃土具沖和脈委蛇不堅直而和緩也脈得中土之生氣如此此以察胃氣為第一要臟氣全憑生克驗審臟氣之生克為第二要如脾病畏弦木剋土也肺病畏洪火剋金也反是則與臟氣無害天時且向逆從窺推天運之順逆為第三要如春氣屬木脈宜弦夏氣屬火脈宜洪之類反是則與天氣不應陽為浮數形偏亢仲景以浮大動滑數為陽凡脈之有力者俱是陰則沉遲勢更卑仲景以沉澀弱弦遲為陰凡脈之無力者皆是此又提出陰陽二字以起下四句辨脈病之宜忌為第四要外感陰來非吉兆外感之證脈宜浮洪而反細弱則正不勝邪矣內虛陽現實堪悲脫血之後脈宜靜細而反洪大則氣亦外脫矣諸凡偏勝皆成病偏陽而洪大偏陰而細弱皆病脈也忽變非常即弗醫舊訣有雀啄屋漏魚翔蝦遊彈石解索釜沸七怪之説總因陰陽離決忽現出反常之象只此數言占必應脈經鋪敘總支離病之名有萬而脈象不過數十種且一病而數十種之脈無不可見何能診脈而即知為何病耶脈書欺人之語最不可聽運氣張飛疇運氣不足憑説諺云不讀五運六氣檢遍方書何濟所以稍涉醫理者動以司運為務曷知天元紀等篇本非素問原文王氏取陰陽大論補入經中後世以為古聖格言孰敢非之其實無關於醫道也況論中明言時有常位而氣無定然猶諄諄詳論者不過窮究其理而已縱使勝復有常而政分南北四方有高下之殊四序有非時之化百步之內晴雨不同千里之外寒暄各異豈可以一定之法而測非常之變耶若熟之以資顧問則可苟奉為治病之法則執一不通矣
