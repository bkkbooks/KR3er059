body:
  text: 卷之四眩暈方一味大黃散鹿茸酒二方見上三字經注加味左歸飲治腎虛頭痛如神並治眩暈目痛熟地七八錢山茱萸懷山藥茯苓枸杞各三錢細辛炙草各一錢川芎二錢肉蓯蓉酒洗切片三四錢水三杯煎八分溫服正元丹祕旨治命門火衰不能生土吐利厥冷有時陰火上衝則頭面赤熱眩暈噁心濁氣逆滿則胸脅刺痛臍肚脹急人參三兩用附子一兩煮汁收入去附子黃耆一兩五錢用川芎一兩酒煮汁收入去川芎山藥一兩用乾薑二錢煮汁收入去乾薑白朮三兩用陳皮五錢煮汁收入去陳皮茯苓二兩用肉桂六錢酒煮汁收入曬乾勿見火去桂甘草一兩五錢用烏藥一兩煮汁收入去烏藥上六味除茯苓文武火緩緩焙乾勿炒傷藥性杵為散每三錢水一盞薑三片紅棗一枚同煎數沸入鹽一捻和滓調服服後飲熱酒一杯以助藥力嘔噦吐方二陳湯半夏二錢陳皮一錢茯苓三錢炙草八分加生薑三片水二杯煎八分服加減法詳三字經注小柴胡湯方見傷寒吳茱萸湯方見隔食反胃大黃甘草湯金匱治食已即吐大黃五錢甘草一錢五分水二杯煎八分服乾薑黃連黃芩人參湯仲景凡嘔家夾熱不利於香砂橘半者服此如神乾薑黃芩黃連人參各一錢五分水一杯半煎七分服進退黃連湯黃連薑汁炒乾薑炮人參人乳拌蒸一錢五分桂枝一錢半夏薑製一錢五分大棗二枚進法用本方七味俱不制水三茶杯煎一杯溫服退法不宜用桂枝黃連減半或加肉桂五分如上逐味制熟煎服法同但空腹服崔氏八味丸三錢半飢服煎劑耳癲狂癇方滾痰丸王隱君治一切實痰異症孕婦忌服青礞石三兩研如米大同焰硝三兩用新磁罐內封固以鐵線扎之外以鹽泥封固煅過研末水飛二兩實沉香五分另研川大黃酒蒸黃芩炒各八兩共為末水泛為丸緑豆大每服一錢至二錢食遠沸湯下生鐵落飲治狂妄不避親疏鐵落一盞用水六杯煮取三杯入下項藥石膏一兩龍齒茯苓防風各七分玄參秦艽各五錢鐵落水三杯煎一杯服一日兩服當歸承氣湯祕傳方治男婦痰迷心竅逾牆越壁胡言亂走歸尾一兩大黃酒洗芒硝枳實厚朴各五錢炙草三錢水二杯煎八分服溫膽湯駱氏內經拾遺云癲狂之由皆是膽涎沃心故神不守舍理宜溫膽亦治癇病即二陳湯加枳實鮮竹茹各二錢或調下飛礬分半當歸龍薈丸治肝經實火大便祕結小便澀滯或胸膈疼痛陰囊腫脹凡屬肝經實火皆宜用之葉天士云動怒驚觸致五志陽越莫制狂亂不避親疏非苦降之藥未能清爽其神識也當歸龍膽草梔子仁黃柏黃連黃芩各一兩大黃蘆薈青黛各五錢木香二錢五分麝香五分另研共為末神麯糊丸每服二十丸薑湯下丹礬丸醫通治五癇黃丹一兩白礬二兩二味入銀罐中煅通紅為末入臘茶一兩不落水豬心血為丸硃砂為衣每服三十丸茶清下久服其涎自便出半月後更以安神藥調之按豬心血不黏宜加煉蜜少許合搗磁朱丸治癲狂癇如神磁石一兩硃砂一兩六神麯三兩生研共研末另以六神麯一兩水和作餅煮浮入前藥加煉蜜為丸如麻子大沸湯下二錢解見時方歌括五淋癃閉赤白濁遺精方五淋湯赤茯苓三錢白芍山梔子各二錢當歸一錢細甘草一錢四分加燈芯十四寸水煎服解見時方歌括滋腎丸又名通關丸治小便點滴不通及治衝脈上逆喘厄等證黃柏知母各一兩肉桂一錢共研末水泛為丸桐子大陰乾每服三錢淡鹽湯下補中益氣湯治一切氣虛下陷方見中風萆薢分清飲治白濁川萆薢四錢益智仁烏藥各一錢半石菖蒲一錢一本加甘草梢一錢五分茯苓二錢水二杯煎八分入鹽一捻服一日兩服四君子湯方見時方歌括歌曰白濁多因心氣虛不應只作腎虛醫四君子湯加遠志一服之間見效奇龍膽瀉肝湯治脅痛口苦耳聾筋痿陰濕熱癢陰腫白濁溲血龍膽草三分黃芩梔子澤瀉各一錢木通車前子各五分當歸甘草生地各三分柴胡一錢水一杯半煎八分服五倍子丸治遺精固脫之方五倍子青鹽煮乾焙茯苓各二兩為末煉蜜丸桐子大每服二錢鹽湯下日兩服妙香散懷山藥二兩茯苓茯神龍骨遠志人參各一兩桔梗五錢木香三錢甘草一兩麝香一錢硃砂二錢共為末每服三錢蓮子湯調下疝氣方五苓散仲景本方治太陽證身熱口渴小便少今變其分兩借用治疝豬苓澤瀉茯苓各二錢肉桂一錢白朮四錢水三杯煎八分服加木通川楝子各一錢五分橘核三錢木香一錢三層茴香丸治一切疝氣如神大茴香五錢同鹽五錢炒川楝子一兩沙參木香各一兩為末米糊丸如桐子大每服三錢空心溫酒下或鹽湯下才服盡接第二料又照前方加蓽撥一兩檳榔五錢共五兩依前丸服法若未愈再服第三料又照前第二方加茯苓四兩附子炮一兩共前八味重十兩丸服如前雖三十年之久大如栲栳皆可消散神效千金翼洗方治丈夫陰腫如斗核中痛雄黃末一兩礬石二兩甘草七錢水五杯煎二杯洗消渴方白虎湯調胃承氣湯理中丸烏梅丸四方俱見傷寒腎氣丸六味湯炙甘草湯三方俱見虛癆麥門冬湯麥門冬四錢半夏一錢五分人參二錢粳米四錢炙甘草一錢大棗二枚水二杯煎八分溫服麻仁丸火麻仁二兩芍藥枳實各五錢大黃厚朴各一兩研末煉蜜丸如桐子大每服十丸米飲下以知為度痰飲方化痰丸王節齋治津液為火熏蒸凝濁鬱結成痰根深蒂固以此緩治之香附童便浸炒五錢橘紅一兩栝蔞仁一兩黃芩酒炒天門冬海蛤粉各一兩青黛三錢芒硝三錢另研桔梗五錢連翹五錢共研為末煉蜜入生薑汁少許為丸如彈子大每用一丸噙化或為小丸薑湯送下二錢苓桂朮甘湯金匱治胸脅支滿目眩並治飲邪阻滯心肺之陽令呼氣短腎氣丸治飲邪阻滯肝腎之陰令吸氣短二方俱見喘證甘遂半夏湯金匱治飲邪留連不去心下堅滿甘遂大者三枚半夏湯洗七次十三枚以水一中杯煮取半杯去滓芍藥五枚約今之三錢甘草如指一枚炙約今之一錢三分水二杯煎六分去滓入蜜半盞再煎至八分服程氏曰留者行之用甘遂以決水飲結者散之用半夏以散痰飲甘遂之性直達恐其過於行水緩以甘草白蜜之甘堅以芍藥之苦雖甘草甘遂相反而實以相使此苦堅甘緩約之之法也靈樞經曰約方猶約囊其斯之謂與尤氏曰甘草與甘遂相反而同用之者蓋欲其一戰而留飲盡去因相激而相成也芍藥白蜜不特安中亦緩毒藥耳十棗湯金匱治懸飲內痛亦治支飲方見腹痛大青龍湯金匱治溢飲之病屬經表屬熱者宜此涼發之小青龍湯金匱治溢飲之病屬經表屬寒者宜此溫發之以上二方俱見傷寒木防己湯金匱人膈中清虛如太空然支飲之氣乘之則滿喘而痞堅面色黧黑脈亦沉緊得之數十日醫者吐之下之俱不愈宜以此湯開三焦之結通上下之氣木防己三錢石膏六錢桂枝二錢人參四錢水二杯煎八分溫服木防己湯去石膏加茯苓芒硝湯金匱前方有人參吐下後水邪因虛而結者服之即愈若水邪實結者雖愈而三日復發又與前方不應者故用此湯去石膏之寒加茯苓直輸水道芒硝峻開堅結也又此方與小青龍湯治吼喘病甚效木防己二錢桂枝二錢茯苓四錢人參四錢芒硝二錢五分水二杯半煎七分去滓入芒硝微煎溫服微利自愈澤瀉湯金匱支飲雖不中正而迫近於心飲邪上乘清陽之位其人苦冒眩冒者昏冒而神不清如有物冒蔽之也眩者目旋轉而乍見眩黑也宜此湯澤瀉五錢白朮二錢水二杯煎七分溫服厚朴大黃湯金匱治支飲胸滿支飲原不中正飲盛則偏者不偏故直驅之從大便出厚朴二錢大黃二錢枳實一錢五分水二杯煎七分溫服葶藶大棗瀉肺湯金匱治支飲不得息方見氣喘小半夏湯金匱治心下支飲嘔而不渴半夏四錢生薑八錢水二杯煎八分溫服己椒藶黃丸金匱治腹滿口舌乾燥腸間有水氣防己椒目葶藶熬大黃各一兩共為細末煉蜜丸如梧子大先飲食服一丸日三服稍增之口中有津液渴者加芒硝半兩程氏曰防己椒目導飲於前清者從小便而出大黃葶藶推飲於後濁者從大便而下此前後分消則腹滿減而水飲行脾氣轉輸而津液生矣小半夏加茯苓湯金匱治卒然嘔吐心下痞滿膈間有水氣眩悸者即小半夏湯加茯苓四錢五苓散金匱治臍下悸吐涎沫而顛眩此水也澤瀉一兩一分豬苓茯苓白朮各十八銖按十黍為一銖約今四分一釐七毫桂枝一兩為末白飲和服方寸匕日三服多飲暖水汗出愈六銖為一分即今之二錢半也澤瀉應一兩二錢五分豬苓白朮茯苓各應七錢五分也方寸匕者匕即匙正方一寸大約八九分余用二錢方合愚按臍下動氣去朮加桂理中丸法也今因吐涎沫是水氣盛必得苦燥之白朮方能制水顛眩是土中濕氣化為陰霾上彌清竅必得溫燥之白朮方能勝濕證有兼見法須變通附方外臺茯苓飲治積飲既去而虛氣塞滿其中不能進食此證最多此方最妙茯苓人參白朮各二錢五分枳實二錢橘皮一錢二分五釐生薑二錢水二杯煎七分服一日三服徐忠可曰俗謂陳皮能減參力此不唯陳皮且加枳實之多補瀉並行何其妙也三因白散滑石五錢半夏三錢附子二錢炮共研末每服五錢加生薑三片蜜三錢水一杯半煎七分服傷寒方太陽桂枝湯桂枝白芍各三錢甘草二錢炙生薑三錢切片大棗四枚水二杯煎八分溫服服後少頃啜粥一杯以助藥力溫覆微似汗若一服病止不必再服若病重者一日夜作二服麻黃湯麻黃三錢去根節桂枝二錢杏仁去皮尖二十三枚甘草一錢水三杯先煮麻黃至二杯吹去上沫納諸藥煎八分溫服不須啜粥余將息如前法大青龍湯麻黃六錢去根節桂枝二錢甘草二錢炙杏仁去皮尖十二枚生薑三錢切片大棗四枚石膏碎以綿裹四錢五分水四杯先煮麻黃至二杯半去上沫納諸藥再煎八分溫服溫覆取微似汗汗出多者以溫粉撲之白朮煅牡蠣龍骨研末若汗多亡陽者以真武湯救之小青龍湯麻黃去根節白芍乾薑不炒甘草桂枝各二錢半夏三錢五味子一錢細辛八分水三杯半先煮麻黃至二杯半去沫納諸藥煎八分溫服若渴者去半夏加栝蔞根二錢若噎者去麻黃加附子一錢五分小便不利小腹痛滿去麻黃加茯苓四錢若喘者去麻黃加杏仁二十一枚按論云若微利者去麻黃加芫花今芫花不常用時法用茯苓四錢代之即豬苓澤瀉亦可代也但行道人當於方後注明桂枝加葛根湯即桂枝湯加葛根四錢水三杯半先煮葛根至二杯半吹去沫入諸藥煎至八分溫服不須啜粥葛根湯葛根四錢麻黃三錢生薑三錢甘草二錢桂枝二錢大棗四枚白芍二錢水三鍾半先煎麻黃葛根至一杯去沫入諸藥煎至八分溫服微似汗不須啜粥陽明白虎湯石膏八錢碎綿裹知母三錢炙草一錢粳米四錢水三杯煎一杯溫服調胃承氣湯大黃四錢清酒潤炙草二錢芒硝三錢水二杯半先煮大黃甘草取一杯去滓入芒硝微煮令沸少少溫服之小承氣湯大黃四錢厚朴枳實各二錢水二杯煎八分溫服初服當更衣不爾者再煮服若更衣勿服大承氣湯大黃二錢酒潤厚朴四錢枳實芒硝各二錢水三杯先煮枳實厚朴至一杯半去滓納大黃煮一杯去滓納芒硝微火煮一二沸服得下勿再服少陽小柴胡湯柴胡四錢人參黃芩炙草生薑各一錢半夏二錢大棗二枚水二鍾煎一鍾去滓再煎八分溫服一日夜作三服胸中煩而不嘔者去半夏人參加栝蔞二錢渴者去半夏加人參七分栝蔞根二錢腹中痛者去黃芩加芍藥一錢半脅下痞鞕去大棗加牡蠣二錢心下悸小便不利者去黃芩加茯苓一錢不渴外有微熱者去人參加桂枝一錢五分溫覆取微似汗愈咳者去人