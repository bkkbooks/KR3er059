body:
  text: 卷之一醫學源流第一醫之始本岐黃黃黃帝也岐岐伯也君臣問答以明經絡臟腑運氣治療之原所以為醫之祖雖神農本經在黃帝之前而神明用藥之理仍始於內經也靈樞作素問詳靈樞九卷素問九卷通謂之內經漢書藝文志載黃帝內經十八篇是也醫門此書即業儒之五經也難經出更洋洋洋洋盛大也難經八十一章多闡發內經之旨以補內經所未言即間有與內經不合者其時去古未遠別有考據也秦越人號扁鵲戰國人著難經越漢季有南陽張機字仲景居南陽官長沙東漢人也著傷寒雜病論金匱玉函經六經辨聖道彰內經詳於針灸至伊尹有湯液治病之法扁鵲倉公因之仲師出而雜病傷寒專以方藥為治其方俱原本於神農黃帝相傳之經方而集其大成傷寒著金匱藏王肯堂謂傷寒論義理如神龍出沒首尾相顧鱗甲森然金匱玉函示寶貴祕藏之意也其方非南陽所自造乃上古聖人所傳之方所謂經方是也其藥悉本於神農本經非此方不能治此病非此藥不能成此方所投必效如桴鼓之相應垂方法立津梁仲師醫中之聖人也儒者不能捨至聖之書而求道醫者豈能外仲師之書以治療李唐後有千金唐孫思邈華原人隱居太白山著千金方千金翼方各三十卷宋仁宗命高保衡林億校正後列禁經二卷今本分為九十三卷較金匱雖有浮泛偏雜之處而用意之奇用藥之巧亦自成一家外臺繼重醫林唐王燾著外臺祕要四十卷分一千一百四門論宗巢氏方多祕傳為醫門之類書後作者漸浸淫等而下之不足觀也已紅紫色鄭衛音間色亂正靡音忘倦逮東垣重脾胃金李杲字明之號東垣老人生於世宗大定二十年金亡入元十七年乃終年七十二舊本亦題元人作脾胃論辨惑論蘭室祕藏後人附以諸家合刻有東垣十書傳世溫燥行升清氣如補中益氣及升陽散火之法如蒼朮白朮羌活獨活木香陳皮葛根之類最喜用之雖未醇亦足貴人謂東垣用藥如韓信將兵多多益善然駁雜之處不可不知惟以脾胃為重故亦可取若河間專主火金劉完素字守真河間人事迹俱詳金史方技傳主火之説始自河間遵之經斷自我原病式十九條俱本內經至真要大論多以火立論而不能參透經旨如火之平氣曰升明火之太過曰赫曦火之不及曰伏明其虛實之辨若冰炭之反也一二方奇而妥如六一散防風通聖散之類皆奇而不離於正也丹溪出罕與儔元朱震亨字彥修號丹溪金華人其立方視諸家頗高一格陰宜補陽勿浮丹溪心法以補陰為主謂陽常有餘陰常不足諸傢俱辨其非以人得天地之氣以生有生之氣即是陽氣精血皆其化生也雜病法四字求謂氣血痰郁是也一切雜病只以此四字求之氣用四君子湯血用四物湯痰用二陳湯郁用越鞠丸參差互用各盡其妙若子和主攻破張子和戴人書中所主多大黃芒硝牽牛芫花大戟甘遂之類意在驅邪邪去則正安不可畏攻而養病病中良勿太過子和之法實症自不可廢然亦宜中病而即止若太過則元氣隨邪氣而俱散挽無及矣四大家聲名噪劉河間張子和李東垣朱丹溪為金元四大家張氏醫通之考核不誤必讀書錯名號李士材醫宗必讀四大家論以張為張仲景誤也仲景為醫中之聖三子豈可與之並論明以後須酌量言醫書充棟汗牛可以博覽之以廣見識非謂諸家所著皆善本也詳而備王肯堂金壇王宇泰諱肯堂著證治準繩雖無所採擇亦醫林之備考也薛氏按説騎牆明薛己號立齋吳縣人著薛氏醫按十六種大抵以四君子六君子逍遙散歸脾湯六八味丸主治語多騎牆士材説守其常李中梓號士材國朝人也著醫宗必讀士材三書雖曰淺率卻是守常初學者所不廢也景嶽出著新方明張介賓字會卿號景嶽山陰人著類經質疑録全書所用之方不外新方八陳其實不足以名方古聖人明造化之機探陰陽之本製出一方非可以思議及者若僅以熟地補陰人參補陽薑附祛寒芩連除熱隨拈幾味皆可名方何必定為某方乎石頑續溫補鄉張璐字路玉號石頑國朝人著醫通立論多本景嶽以溫補為主獻可論合二張明寧波趙獻可號養葵著醫貫大旨重於命門與張石頑張景嶽之法相同診脈法瀕湖昂明李時珍字東璧號瀕湖著本草綱目五十二卷雜收諸説反亂神農本經之旨卷末刻脈學頗佳今醫多宗之數子者各一長知其所長擇而從之揆諸古亦荒唐理不本於內經法未熟乎仲景縱有偶中亦非不易矩矱長沙室尚倣徨數子雖曰私淑長沙升堂有人而入室者少矣惟韻伯能憲章慈溪柯琴字韻伯國朝人著傷寒論注論翼大有功於仲景而內經之旨賴之以彰徐尤著本喻昌徐彬號忠可尤怡號在涇二公金匱之注俱本喻嘉言考嘉言名昌江西南昌人崇禎中以選舉入都卒無所就遂專務於醫著尚論篇主張太過而醫門法律頗能闡發金匱之祕旨大作者推錢塘張志聰號隱菴高世栻號士宗俱浙江錢塘人也國朝康熙間二公同時學醫與時不合遂閉門著書以為傳道之計所注內經本草經傷寒論金匱等書各出手眼以發前人所未發為漢後第一書今醫畏其難而不敢談及取法上得慈航取法乎上僅得其中切不可以醫方集解本草備要醫宗必讀萬病回春本草綱目東醫寶鑑馮氏錦囊景嶽全書薛氏醫按等書為捷徑也今之醫輩於此書並未寓目止取數十種庸陋之方冀圖幸中更不足論也中風第二人百病首中風內經云風為百病之長也昔醫云中臟多滯九竅有唇緩失音耳聾目瞀鼻塞便難之症中腑多著四肢中經則口眼喎斜中血脈則半身不遂驟然得八方通中風病驟然昏倒不省人事或痰湧掣搐偏枯等症八方者謂東西南北東北西北東南西南也閉與脫大不同風善行而數變其所以變者亦因人之臟腑寒熱為轉移其人臟腑素有鬱熱則風乘火勢火借風威而風為熱風矣其人臟腑本屬虛寒則風水相遭寒冰徹骨而風為寒風矣熱風多見閉症宜疏通為先寒風多見脫症宜溫補為急開邪閉續命雄小續命湯風症之雄師也依六經見症加減治之專主驅邪閉者宜開或開其表如續命湯是也或開其里如三化湯是也或開其壅滯之痰如稀涎散滌痰湯是也固氣脫參附功脫者宜固參附湯固守腎氣朮附湯固守脾氣耆附湯固守衛氣歸附湯固守營氣先固其氣次治其風若三生飲一兩加人參一兩則為標本並治之法正虛邪盛必遵此法顧其名思其義名之曰風明言八方之風也名之曰中明言風自外入也後人議論穿鑿俱不可從若舍風非其治既名中風則不可舍風而別治也火氣痰三子備劉河間舉五志過極動火而卒中皆因熱甚故主乎火大法用防風通聖散之類亦有引火歸源如地黃飲子之類李東垣以元氣不足而邪湊之令人卒倒如風狀故主乎氣虛大法補中益氣湯加減朱丹溪以東南氣溫多濕有病風者非風也由濕生痰痰生熱熱生風故主乎濕大法以二陳湯加蒼朮白朮竹瀝薑汁之類不為中名為類中者自外而入於內也此三者既非外來之風則不可仍名為中時賢名為類中風合而言小家伎虞天民云古人論中風言其症也三子論中風言其因也蓋因氣因濕因火挾風而作何嘗有真中類中之分喑喎斜昏仆地喑者不能言也喎斜者口眼不正也昏仆地者不省人事猝倒於地也口開目合或上視撒手遺尿鼾睡汗出如油者不治急救先柔潤次柔潤熄風為治中風之祕法喻嘉言加味六君子湯資壽解語湯甚妙填竅方宗金匱內經云邪害空竅金匱中有侯氏黑散風引湯驅風之中兼填空竅空竅滿則內而舊邪不能容外而新風不復入矣喻嘉言曰仲景取藥積腹中不下填竅以熄風後人不知此義每欲開竅以出其風究竟竅空而風愈熾長此安窮哉三化湯愈風湯大秦艽湯皆出機要方中云是通真子所撰不知其姓名然則無名下士煽亂後人見聞非所謂一盲引衆盲耶虛癆第三虛癆病從何起咳嗽吐血五心煩熱目花耳鳴口爛鼻乾氣急食不知味羸瘦驚悸夢遺往來寒熱怠惰嗜臥疲倦骨蒸不寐女子不月等症皆成癆病七情傷上損是扁鵲謂損其陽自上而下一損肺二損心三損胃過於胃則不可治其説本於內經二陽之病發心脾有不得隱曲為女子不月按心脾上也至不得隱曲女子不月則上極而下矣歸脾湯二陽旨即內經二陽之病發心脾之旨也此方為養神法六味丸為補精法高鼓峰並用之下損由房幃邇扁鵲謂損其陰自下而上一損腎二損肝三損脾過於脾則不可治其説本於內經五臟主藏精也不可傷傷則失守而無氣無氣則死矣按精生於五臟而統司於腎如色欲過度則積傷而下損至於失守無氣則下極而上矣傷元陽虧腎水腎氣即元陽也元陽傷為困倦食少便溏腰痛陽痿等症腎水即元陰也元陰虧為蒸熱咳嗽吐血便血遺精喉痛口瘡齒牙浮動等症腎水虧六味擬六味地黃丸為補腎水之主方景嶽左歸飲左歸丸亦妙推之三才湯八仙長壽丸都氣丸天王補心丹皆可因症互服元陽傷八味使崔氏腎氣丸後人為八味地黃丸立方之意原為暖腎逐水非補養元氣明薛立齋及趙養葵始用以溫補命火時醫遂奉為溫補腎命之主方景嶽右歸飲右歸丸皆本諸此如火未大衰者以還少丹代之陽虛極者宜近效白朮湯各醫書伎止此苦寒敗胃及辛熱耗陰固無論已即六味歸脾何嘗非流俗之套法甘藥調回生理扁鵲云針藥莫治者調以甘藥仲景因之喻嘉言曰壽命之本積精自剛然精生於穀谷入少則不能生血血少則不能化精內經云精不足者補之以味味者五穀之味也補以味而節其勞則積貯漸富大命不傾也建中湯金匱軌小建中湯及加黃耆加人參加當歸加白朮等湯皆急建其中氣俾飲食增而津液旺以至充血生精而復其真陰之不足但用稼穡作甘之本味而酸辛苦鹹在所不用蓋舍此別無良法也按炙甘草湯即此湯化為潤劑喻氏清燥湯即此湯化為涼劑薯蕷丸風氣弭金匱薯蕷丸自注云治虛癆諸不足風氣百疾蟅蟲丸乾血已金匱大黃蟅蟲丸自注治五癆諸傷內有乾血肌膚甲錯二神方能起死尤在涇云風氣不去則足以賊正氣而生長不榮以薯蕷丸為要方乾血不去則足以留新血而灌溉不周以蟅蟲丸為上劑今之醫輩能夢見此二方否咳嗽第四氣上嗆咳嗽生內經云五臟六腑皆令人咳不獨肺也然肺為氣之市諸氣上逆於肺則嗆而咳是咳嗽不止於肺而亦不離於肺也肺最重胃非輕內經雖分五臟諸咳而所尤重者在聚於胃關於肺六字蓋胃中水穀之氣不能如霧上蒸於肺而轉溉諸臟只是留積於胃中隨熱氣而化為痰隨寒氣而化為飲胃中既為痰飲所滯則輸肺之氣亦必不清而為諸咳之患矣肺如鍾撞則鳴肺為臟腑之華蓋呼之則虛吸之則滿只受得本然之正氣受不得外來之客氣客氣干之則嗆而咳矣亦只受得臟腑之清氣受不得臟腑之病氣病氣干之亦嗆而咳矣肺體屬金譬若鍾然一外一內皆所以撞之使鳴也風寒入外撞鳴經云微寒微咳可見咳嗽多因於風寒也風從皮毛而入於肺寒從背俞而入於肺皆主乎外也後注雖言熱言濕言燥令不自行亦必假風寒以為之帥也癆損積內撞鳴癆傷咳嗽主乎內也二者不治至於咳嗽失音是金破不鳴矣誰治外六安行六安煎雖無深義卻亦平穩然外感諸咳當辨風熱風燥二症如冬時先傷非節之暖復加風寒外遏以致咳嗽痰結咽腫身重自汗脈浮者風熱也宜萎蕤湯辛潤之劑切勿辛熱發散而風燥一症辨治尤難蓋燥為秋氣令不獨行必假風寒之威而令乃振咳乃發也內經只言秋傷於濕何也以長夏受濕土鬱蒸之氣隨秋令收斂伏於肺胃之間直待秋深燥令大行與濕不能相容至冬而為咳嗽也此症有肺燥胃濕兩難分解之勢唯千金麥門冬湯五味子湯獨得其祕後人以斂散不分燥潤雜出棄之昧之甚也誰治內虛癆程宜於虛癆門擇其對症之方審是房癆傷精則補精審是思郁傷脾則養神挾水氣小龍平柯韻伯治咳嗽不論冬夏不拘淺深但是寒嗽俱用小青龍湯多效方中驅風散寒解肌逐水利肺暖腎除痰定喘攘外安內各盡其妙蓋以肺家沉寒痼冷非麻黃大將不能搗其巢穴群藥安能奏效哉兼鬱火小柴清寒熱往來咳嗽者宜去人參大棗生薑加乾薑五味治之薑細味一齊烹金匱治痰飲咳嗽不外小青龍湯加減方中諸味皆可去取唯細辛乾薑五味不肯輕去即面熱如醉加大黃以清胃熱及加石膏杏仁之類總不去此三味學者不可不深思其故也徐忠可金匱辨注有論長沙法細而精金匱痰飲咳嗽治法宜熟讀之瘧疾第五瘧為病屬少陽少陽為半表半裡邪居其界入與陰爭則寒出與陽爭則熱爭則病作息則病止止後其邪仍據於少陽之經寒與熱若回翔寒熱必應期而至日一發亦無傷邪淺則一日一作邪深則二日一作三日作勢猖狂瘧三日一作時醫名三陰瘧留連難愈治之法小柴方以小柴胡湯為主初起俗忌人參姑從俗而去之加青皮一錢熱偏盛加清涼小柴胡湯加知母花粉石膏黃連之類隨宜擇用寒偏重加桂薑加乾薑桂枝甚者加附子肉桂邪氣盛去參良身熱者小柴胡湯去人參加桂枝一錢服後食熱粥溫覆取微汗常山入力倍強小柴胡湯加常山二三錢俗云邪未淨不可用常山以截之不知常山非截邪之品乃驅邪外出之品仲景用其苗名曰蜀漆大虛者獨參湯虛人久瘧不愈以人參一兩生薑五錢水煎五更服極效貧者以白朮一兩代之熱多者以當歸代之單寒牝理中匡單寒無熱名曰牝瘧宜附子理中湯加柴胡治之單熱疸白虎詳單熱無寒名曰疸瘧或先熱後寒名曰熱瘧俱宜以白虎湯加桂枝治之時醫以六味湯加柴胡芍藥治之法外法辨微茫以上皆前醫之成法更法外有法不可不辨而治之消陰翳制陽光熱之不熱是無火也益火之源以消陰翳寒之不寒是無水也壯水之主以制陽光太僕注慎勿忘王太僕消陰制陽等注千古不刊之論趙養葵遵之以八味丸益火之源六味丸壯水之主久瘧多以此法收功痢症第六濕熱傷赤白痢王損庵論痢專主濕熱其症裡急後重腹痛欲便不便膿血穢濁或白或赤或赤白相半熱勝濕赤痢漬胃為多氣多血之海熱陽邪也熱勝於濕則傷胃之血分而為赤痢濕勝熱白痢墜濕陰邪也濕勝於熱則傷胃之氣分而為白痢赤白相半則為氣血兩傷調行針須切記行血則膿血自愈調氣則後重自除此四句為治初痢之格言須切記之芍藥湯熱盛餌芍藥湯調氣行血雖為初痢之總方究竟宜於熱症平胃加寒濕試寒濕瀉痢初起者以平胃散加乾薑澤瀉豬苓木香治之久而不愈送下香連丸熱不休死不治方書云痢症發熱不休者不治痢門方皆所忌凡痢症初起即發熱非肌表有邪即經絡不和溫散而調營衛外邪一解痢亦鬆去若概以為熱開手即用痢門套方多有陷入變劇者桂葛投鼓邪出時醫有發汗之戒以其無外證而妄汗之也若頭痛發熱惡寒有汗宜用桂枝湯法無汗宜用葛根湯法鼓邪外出然後治其痢外疏通內暢遂此二句是解所以發汗之故也張飛疇云當歸四逆湯治痢極效若發熱而嘔者小柴胡湯葛根黃連黃芩甘草湯口渴下重者白頭翁湯如神嘉言書獨得祕喻嘉言醫門法律中議論甚見透徹寓意存補金匱喻嘉言寓意草中如麻黃附子細辛湯及人參敗毒散等案卻能補金匱所未及心腹痛胸痹第七心胃疼有九種真心痛不治今所云心痛者皆心胞絡及胃脘痛也共有九種宜細辨之辨虛實明輕重虛者喜按得食則止脈無力實者拒按得食愈痛脈有力二症各有輕重痛不通氣血壅痛則不通氣血壅滯也通不痛調和奉通則不痛氣血調和也高士宗云通之之法各有不同調氣以和血調血以和氣通也上逆者使之下行中結者使之旁達亦通也虛者助之使通寒者溫之使通無非通之之法也若必以下泄為通則妄矣一蟲痛烏梅丸蟲痛時痛時止唇舌上有白花點得食愈痛蟲為厥陰風木之化宜烏梅丸二注痛蘇合研入山林古廟及見非常之物脈乍大乍小兩手若出兩人宜蘇合丸研而灌之三氣痛香蘇專因大怒及七情之氣作痛宜香蘇飲加元胡索二錢七氣湯亦妙又方用百合一兩烏藥三錢水煎服四血痛失笑先瘀血作痛痛如刀割或有積塊脈澀大便黑宜桃仁承氣湯失笑散五悸痛妙香詮悸痛即虛痛也痛有作止喜按得食稍止脈虛弱宜妙香散或理中湯加肉桂木香主之六食痛平胃煎食積而痛噯腐吞酸其痛有一條扛起者宜平胃散加山楂穀芽主之傷酒再加葛根三錢砂仁一錢然新傷吐之久傷下之為正法七飲痛二陳咽停飲作痛時吐清水或脅下有水聲宜二陳湯加白朮澤瀉主之甚者十棗湯之類亦可暫服八冷痛理中全冷痛身涼脈細口中和宜理中湯加附子肉桂主之兼嘔者吳茱萸湯主之九熱痛金鈴痊熱痛身熱脈數口中熱宜金鈴子元胡索各二兩研末黃酒送下二錢名金鈴子散甚效如熱甚者用黃連梔子之類入生薑汁治之腹中痛照諸篇臍上屬太陰中臍屬少陰臍下屬厥陰兩脅屬少陽厥陰之交界地面宜分治之然其大意與上相同金匱法可回天金匱要略中諸議論皆死症求生之法諸方論要拳拳中庸云得一善則拳拳服膺而弗失之矣腹滿痛而下利者虛也吐瀉而痛太陰證也宜理中湯雷鳴切痛嘔吐者寒氣也宜附子粳米湯此以下利而知其虛也胸滿痛而大便閉者實也閉痛而不發熱者宜厚朴三物湯專攻其里閉痛而兼發熱者宜厚朴七物湯兼通表裡閉痛發熱痛連脅下脈緊弦者宜大黃附子湯溫下並行此以便閉而知其實也若繞臍疼痛名寒疝烏頭煎之峻不敢遽用而當歸生薑羊肉湯之妙更不可不講也又胸痹非偶然胸膺之上人身之太空也宗氣積於此非偶然也薤白酒妙轉旋栝蔞薤白白酒湯或加半夏或加枳實薤白桂枝湯之類皆轉旋妙用虛寒者建中填心胸大寒痛嘔不能飲食寒氣上衝有頭足不可觸近宜大建中湯主之上中二焦為寒邪所痹故以參薑啓上焦之陽合飴糖以建立中氣而又加椒性之下行降逆上之氣復下焦之陽為補藥主方隔食反胃第八隔食病津液干方書名膈者以病在膈上是也又名隔者以食物不下而阻隔也津液乾枯為隔食病源胃脘閉穀食難胃脘乾枯閉小水飲可行食物難下時賢法左歸餐趙養葵用大劑六味湯主之高鼓峰仿趙養葵之法以六味加生地當歸主之楊乘六用左歸飲去茯苓加當歸生地以左歸飲中有甘草引入陽明開展胃陰去茯苓者恐其旁流入坎不如專顧陽明之速效也胃陰展賁門寬如膏如脂疊積胃底即胃陰也久隔之人則胃陰亡矣高鼓峰云治隔一陽明盡之陽明者胃也但使胃陰充拓在上之賁門寬展則食物入在下之幽門闌門滋潤則二便不閉而隔症愈矣啓膈飲理一般啓膈飲亦是和胃養陰之意但此方泄肺氣之郁彼方救腎水之枯一陰一陽宜擇用之推至理衝脈干張石頑云膈咽之間交通之氣不得降者皆衝脈上行逆氣所作也大半夏加蜜安衝脈不治取之陽明仲景以半夏降衝脈之逆即以白蜜潤陽明之燥加人參以生既亡之津液用甘瀾水以降逆上之水液古聖之經方惟仲景知用之金匱祕仔細看金匱明明用半夏後人諸書皆以半夏為戒毀聖之説倡自何人君子惡之若反胃實可嘆食得入而良久反出名為反胃朝暮吐分別看朝食暮吐暮食朝吐與隔食症宜分別而藥之乏火化屬虛寒王太僕云食不得入是有火也食入反出是無火也此症屬中焦下焦火衰無疑吳萸飲獨附丸妙在吳萸鎮厥陰逆氣配入甘溫令震坤合德土木不害生附子以百沸湯俟溫浸去鹽日換湯三次三日外去皮放地上四面以磚圍外以炭火燒一時則附子盡裂乘熱投以薑汁又如法制之大抵一斤附子配一斤薑汁以薑汁干為度研末蜜丸以粟米稀粥送下二錢六君類俱神丹六君子湯加薑附及附子理中湯之類氣喘第九喘促症治分門氣急而上奔宜分別而治之鹵莽輩只貞元貞元飲是治血虛而氣無所附以此飲濟之緩之方中熟地當歸之潤所以濟之甘草之甘所以緩之常服調養之劑非急救之劑也今醫遇元氣欲脫上奔之症每用此飲以速其危良可浩嘆陰霾盛龍雷奔喘症多屬飲病飲為陰邪非離照當空群陰焉能退避若地黃之類附和其陰則陰霾沖逆肆空飲邪滔天莫救而龍雷之火愈因以奔騰矣實喘者痰飲援喘症之實者風寒不解有痰飲而為之援則咳嗽甚而喘症作矣葶藶飲十棗湯肺氣實而氣路閉塞為喘者以葶藶大棗瀉肺湯主之咳嗽氣喘心下停飲兩脅滿痛者以十棗湯主之青龍輩撤其藩此方解表兼能利水治內外合邪以兩撤之虛喘者補而溫虛喘氣促不能接續脈虛細無力溫補二字宜串看有以溫為補者有以補為溫者切不可走於貞元一路留滯痰涎也桂苓類腎氣論仲景云氣短有微飲者宜從小便去之桂苓朮甘湯主之腎氣丸亦主之平沖逆泄奔豚沖氣上逆宜小半夏加茯苓湯以降之奔豚症初起臍下動氣久則上逆衝心宜茯苓桂枝甘草大棗湯以安之真武劑治其源經云其標在肺其本在腎真武湯為治喘之源也金水母主諸坤肺屬金而主上腎屬水而主下虛喘為天水不交之危候治病當求其本須知天水一氣而位乎天水之中者坤土也況乎土為金母金為水母危篤之症必以脾胃為主六君子妙難言六君子湯加五味乾薑北細辛為治喘神劑面腫加杏仁面熱如醉加大黃此法時師聞之莫不驚駭能讀金匱者始知豫言之不謬也他標劑忘本根唯黑錫丹鎮納元氣為喘症必用之劑此外如蘇子降氣湯定喘湯及沉香黑鉛丹皆是害人之劑血症第十血之道化中焦經曰中焦受氣取汁變化而赤是謂血本衝任中溉澆血之流溢半隨衝任而行於經絡溫肌腠外逍遙血之流溢半散於脈外而充肌腠皮毛六淫逼經道搖六淫者風寒暑濕燥火也經常也道路也言血所常行之路也外邪傷之則搖動宜表散麻芍條外傷宜表散東垣治一人內蘊虛熱外感大寒而吐血法仲景麻黃湯加補劑名麻黃人參芍藥湯一服而愈七情病溢如潮七情者喜怒哀懼愛惡欲也七情之動出於五志醫書恆謂五臟各有火五志激之則火動火動則血隨火而溢然五志受傷既久則火為虛火宜以甘溫之法治之引導法草薑調甘草乾薑湯如神或加五味子二錢火盛者加干桑皮三錢小麥一兩時醫因歸脾湯有引血歸脾之説謂引血歸脾即是歸經試問脾有多大能容離經之血成鬥成盆盡返而歸於內而不裂破乎市醫固無論矣而以名醫自負者亦蹈此弊實可痛恨溫攝法理中超理中湯加木香當歸煎服凡吐血服涼藥及滋潤益甚外有寒冷之象者是陽虛陰走也必用此方血得暖則循行經絡矣此法出仁齋直指涼瀉法令瘀銷火勢盛脈洪有力寒涼之劑原不可廢但今人於血症每用藕節黑梔白芨舊墨之類以止澀之致留瘀不散以為咳嗽虛癆之基金匱瀉心湯大黃倍於芩連為寒以行瘀法柏葉湯治吐不止為溫以行瘀法二方為一溫一寒之對子赤豆散下血標糞前下血為近血金匱用當歸赤小豆散若黃土實翹翹糞後下血為遠血金匱用黃土湯一切血此方饒黃土湯不獨糞後下血方也凡吐血衄血大便血小便血婦人血崩及血痢久不止可以統治之以此方暖中宮土臟又以寒熱之品互佐之步步合法也五臟有血六腑無血觀剖諸獸腹心下夾脊包絡中多血肝內多血心脾肺腎中各有血六腑無血近時以吐血多者謂為吐胃血皆耳食昔醫之誤凡吐五臟血必死若吐血衄血下血皆是經絡散行之血也水腫第十一水腫病有陰陽腫皮膚腫大初起目下有形如臥蠶後漸及於一身按之即起為水腫按之陷而不起為氣腫景嶽以即起為氣不起為水究之氣行水即行水滯氣亦滯可以分可以不必分也只以陰水陽水為分別便清利陰水殃小便自利口不渴屬寒名為陰水便短縮陽水傷小便短縮口渴屬熱名為陽水五皮飲元化方以皮治皮不傷中氣方出華元化中藏經陽水盛加通防五皮飲加木通防己赤小豆之類陰水盛加桂薑五皮飲加乾薑肉桂附子之類知實腫蘿枳商知者真知其病情而無兩可之見壯年腫病驟起脈實者加蘿蔔子枳實之類知虛腫參朮良老弱病久腫漸成脈虛者加人參白朮之類兼喘促真武湯腫甚小便不利氣喘尺脈虛者宜真武湯暖土行水間用桂苓甘術湯化太陽之氣守服十餘劑繼用導水茯苓湯二劑愈今人只重加味腎氣丸而不知其補助陰氣反益水邪不可輕服也從俗好別低昂以上諸法皆從俗也然從俗中而不逾先民之矩矱亦可以救人五水辨金匱詳病有從外感而成者名風水病從外感而成其邪已滲入於皮不在表而在裡者名皮水病有不因於風由三陰結而成水者名正水病有陰邪多而沉於下者名石水病有因風因水傷心鬱熱名黃汗金匱最詳熟讀全書自得其旨否則鹵莽誤事耳藥方中精義頗詳宜細玩之補天手十二方越婢湯防己茯苓湯越婢加白朮湯甘草麻黃湯麻黃附子湯杏子湯蒲灰散耆芍桂酒湯桂枝加黃耆湯桂甘薑棗麻辛附子湯枳朮湯附方外臺防己黃耆湯肩斯道勿炎涼群言淆亂衷於聖以斯道為己任勿與世為浮沉余有厚望焉
