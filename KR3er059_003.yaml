body:
  text: 卷之三中風方小續命湯千金中風總方麻黃去節根人參黃芩川芎白芍炙草杏仁防己桂枝防風各一錢附子五分炮加生薑三片水二杯半先煎麻黃至二杯入諸藥煎八分服古今録驗續命湯治中風風痱身體不能自收持口不言昏冒不知痛處或拘急不能轉側方出金匱附方麻黃桂枝當歸人參石膏乾薑甘草各三錢川芎一錢五分杏仁十三枚又一枚取三分之一水三杯煎一杯溫服當小汗薄覆脊憑几汗出則愈不汗更服無所禁勿當風並治但伏不得臥咳逆上氣面目浮腫三化湯治熱風中臟大便不通大黃羌活枳殼各三錢水二杯煎八分服稀涎散治中風口噤並治單蛾雙蛾巴豆六枚每枚分作兩片牙皂三錢切明礬一兩先將礬化開卻入二味攪勻待礬枯為末每用三分吹喉中痰盛者燈心湯下五分在喉即吐在膈即下參附湯元氣暴脫以此方急回其陽可救十中一二人參一兩附子五錢水二杯半煎八分服此湯治腎氣脫以人參換白朮名朮附湯治脾氣脫換黃耆名耆附湯治衛氣脫換當歸名歸附湯治營氣脫三生飲治寒風中臟四肢厥冷痰涎上湧生烏頭二錢生南星二錢生附子三錢木香五分生薑五片水二杯煎七分薛氏用人參一兩煎湯半杯調服防風通聖散治熱風卒中外而經絡手足瘈瘲內而臟腑二便閉塞用此兩解之較之三化湯較妥亦為類中風實火治法所用表藥火鬱發之之義也所用下藥釜下抽薪之義也防風荊芥連翹麻黃薄荷川芎當歸白芍白朮山梔大黃芒硝各五分黃芩石膏桔梗各一錢甘草二錢滑石三錢水二杯加生薑三片煎八分服自利去硝黃自汗去麻黃加桂枝涎嗽加半夏五味地黃飲子治類中風腎虛火不歸源舌強不能言足廢不能行類中風虛火治法熟地遠志山茱肉巴戟天石斛石菖蒲五味子肉蓯蓉洗肉桂麥冬附子茯苓各三錢加薄荷葉七葉水二杯煎八分服此方法在輕煎不令諸藥之味盡出其性厚重以鎮諸逆其氣味輕清速走諸竅也補中益氣湯治勞役飢飽過度致傷元氣氣虛而風中之此類中風氣中虛證更有七氣上逆亦名氣中宜越鞠丸之類炙耆二錢人參白朮炒當歸各一錢炙草陳皮各五分升麻柴胡各三分加生薑三片大棗二枚水二杯煎八分服二陳湯痰飲通劑陳皮一錢五分半夏茯苓各三錢炙草一錢加生薑三片水三杯煎七分服加白朮一錢蒼朮二錢竹瀝四湯匙生薑汁二湯匙名加味二陳湯治類中風痰中證亦名濕中以濕生痰也加枳實膽南星竹茹名滌痰湯加味六君子湯治中風王道之劑方見隔食加麥冬三錢為君附子一錢為使再調入竹瀝五錢生薑汁二錢以行經絡之痰久服自愈資壽解語湯喻嘉言治中風脾緩舌強不語半身不遂與地黃飲子同意但彼重在腎此重在脾防風附子天麻棗仁各二錢羚角肉桂各八分羌活甘草各五分水二杯煎八分入竹瀝五錢薑汁二錢五分服喻嘉言治腎氣不榮於舌本加枸杞首烏生地菊花天冬石菖蒲元參侯氏黑散金匱治大風四肢煩重心中惡寒不足者外臺治風癲菊花四兩白朮防風各一兩桔梗八錢細辛茯苓牡蠣人參礬石當歸川芎乾薑桂枝各三錢黃芩五錢上十四味杵為散酒服方寸匕約有八分余每用一錢五分日二服溫酒調服忌一切魚肉大蒜宜常冷食六十日止熱即下矣風引湯金匱除熱癱癇治大人風引少小驚癇瘈瘲日數十發大黃乾薑龍骨各一兩桂枝一兩五錢甘草牡蠣各一兩寒水石赤石脂石膏滑石紫石英白石脂各三兩上十二味研末粗篩用韋布盛之取三指約六七錢井花水一杯煎七分溫服按乾薑宜減半附録中風俗方殺人以示戒俗傳中風方風症以攻痰為大戒凡人將死之頃皆痰聲漉漉不獨中風一症元陽無主一身之津血俱化為痰欲攻盡其痰是欲攻盡其津血也故録此以為戒膽南星寒膩大傷胃氣且能引痰入於心包肝膽以成痼疾制一二次者力尚輕若九制則為害愈酷枳殼耗散元氣痰盛得此暫開少頃旋而中氣大傷痰涎如湧石菖蒲能開心竅心竅開則痰涎直入其中永無出路半夏此藥雖能降逆開結但與膽星同用未免助紂為虐秦艽羌活天麻羚角防風鉤藤鉤以上六味雖風證所不忌但無要藥以主持之亦徒成糟粕無用之物天竺黃真者難得然亦治火痰之標品殭蠶雖祛風之正藥但力薄不足恃牛黃雖為風痰之妙藥然與膽南星石菖蒲枳殼同用則反引痰入於心竅驅之弗出矣竹瀝以薑汁和之雖能驅經絡之痰而與膽星等同用不得中氣之輸布反致寒中敗胃之患甘草雖為元老之才但與諸藥同用小人道長君子道消亦無如之何矣以上諸品或作一方或分作二三方患者誤服之輕者致重重者即死即幸免於死亦必變為癡呆及偏枯無用之人矣戒之虛勞方歸脾湯此方補養後天第一藥治食少不眠怔忡吐血下血大便或溏或祕妄夢健忘七情所傷遺精帶濁及女子不月等證炙耆三錢人參白朮蒸棗仁炒黑當歸身龍眼肉茯神各二錢木香五分炙草一錢遠志五分去心水三杯煎八分溫服高鼓峰去木香加白芍一錢五分甚妙咳嗽加麥冬二錢五味七分鬱氣加貝母二錢脾虛發熱加丹皮梔子六味地黃丸壯水之主以制陽光凡一切吐血下血咳嗽不眠骨蒸遺精淋濁屬於陰虛者無不統治之熟地八兩山茱肉四兩懷山藥四兩丹皮茯苓澤瀉各三兩研末煉蜜為丸如桐子大曬乾每服三錢淡鹽湯送下一日兩服加五味子名都氣丸加麥冬名八仙長壽丸治咳嗽本方減兩為錢水煎服名六味地黃湯八味地黃丸益火之源以消陰翳治腰膝無力飲食不進腫脹疝瘕陽痿遺精帶濁屬於元陽虛者無不統治之即六味丸加附子肉桂各一兩本方去附子名七味丸能引火歸源本方去附子加五味子名加減八味丸治大渴不止本方加牛膝車前子名濟生腎氣丸俗名金匱腎氣丸治水腫喘促本方減兩為錢水煎服名八味湯小建中湯仲景此方為治虛癆第一方今人不講久矣凡癆證必有蒸熱此方有薑桂以扶心陽猶太陽一出則爝火無光即退熱法也凡癆證必飲食日少此方溫脾即進食法也凡癆證必咳嗽此方補土以生金即治嗽法也凡癆證多屬腎虛此方補脾以輸精及腎所謂精生於穀也今人不能讀仲景書反敢侮謗聖法徒知生脈六味八味歸脾補中及款冬貝母玉竹百合蘇陳醬地黃炭之類互服至死誠可痛恨生白芍三錢桂枝一錢五分炙草一錢加生薑一錢五分大棗二枚水二杯煎八分入飴糖三錢五分煬服加黃耆二錢名黃耆建中湯治虛癆諸不足飽悶者去大棗加茯苓二錢氣逆者加半夏一錢五分此方人參當歸白朮俱隨宜加之炙甘草湯金匱肺燥肺痿咽痛脈代等證生地四錢桂枝木一錢阿膠一錢五分炙草二錢人參一錢麥冬二錢五分棗仁原方火麻仁一錢五分加生薑一錢大棗二枚水一杯酒半杯煎八分服清燥救肺湯喻嘉言治燥氣鬱而成癆桑葉經霜者去蒂三錢人參一錢石膏二錢三分研杏仁去皮尖一錢二分甘草一錢二分麥冬一錢枇杷葉去毛蜜炙一錢三分黑芝麻一錢五分炒研水二杯半煎八分熱服痰多加貝母三錢或加梨汁半盞薯蕷丸金匱治虛癆諸不足風氣百疾薯蕷三十分當歸桂枝曲乾地黃豆黃卷各十分甘草二十八分人參阿膠各七分芎藭芍藥白朮麥冬杏仁防風各六分柴胡桔梗茯苓各五分乾薑三分白蘞二分大棗百枚為膏上二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑分去聲古以二錢半為一分大黃䗪蟲丸金匱治五勞虛極羸瘦腹滿不能飲食食傷憂傷房室傷飢傷勞傷經絡榮衛傷內有乾血肌肉甲錯目黯黑緩中補虛大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾漆二兩乾地黃十兩虻蟲一升水蛭一百個蠐螬一升䗪蟲半升上十二味末之煉蜜丸如小豆大酒服五丸日三服愚按以搜血之品為補血之用仿於內經四烏鰂骨一藘茹丸張路玉以此丸藥料及鮑魚入絨毛雞腹內黃酒童便煮爛汁干將雞去骨取肉同諸藥懸火上烘乾為末加煉蜜為丸每服二錢以黃酒送下日三服代䗪蟲丸甚妥咳嗽諸方六安煎景嶽治外感咳嗽半夏二錢陳皮一錢五分茯苓二錢甘草一錢杏仁二錢去皮尖白芥子一錢炒研加生薑七片水煎服寒甚加細辛七分愚每用必去白芥子加五味子乾薑細辛小青龍湯治一切咳嗽方見傷寒方中隨寒熱虛實加減唯細辛乾薑五味三藥不去讀金匱者自知加減小柴胡湯治發熱咳嗽柴胡四錢半夏二錢黃芩炙草各一錢五分乾薑一錢五味子八分水二杯半煎一杯半去滓再煎八分溫服一日二服五味子湯千金治傷燥咳唾中有血牽引胸脅痛皮膚乾枯五味子五分研桔梗甘草紫菀茸續斷竹茹桑根皮各一錢生地黃二錢赤小豆一撮即赤豆之細者上九味水煎空心服祕旨加白蜜一匙愚按赤豆易生扁豆五錢囫圇不研最能退熱補肺但有寒熱往來忌之去續斷赤豆地黃加葳蕤門冬乾薑細辛亦妙麥門冬湯千金治大病後火熱乘肺咳唾有血胸膈脹滿上氣羸瘦五心煩熱渴而便祕麥門冬二錢去心桔梗桑根皮半夏生地黃紫菀茸竹茹各一錢麻黃七分甘草五分炙五味子十粒研生薑一片上十一味水煎空心服瘧疾方小柴胡湯一切瘧病俱治方見傷寒痢症方芍藥湯行血則膿血自愈調氣則後重自除三日內俱可服白芍當歸各二錢半黃連黃芩各一錢二分桂四分檳榔一錢木香六分甘草四分大黃一錢虛人不用厚朴一錢炙枳殼一錢青皮五分水二杯煎八分溫服小便不利加滑石澤瀉滯澀難出虛者倍歸芍實者倍大黃紅痢加川芎桃仁人參敗毒散喻嘉言最重此方令微汗則陽氣升而陷者舉矣此法時醫不講余每用此方加陳倉米四錢或加黃芩黃連屢用屢效羌活獨活前胡柴胡川芎枳殼茯苓桔梗人參以上各一錢甘草一分水二杯加生薑三片煎七分服加倉米名倉廩湯治噤口痢心腹痛胸痹方烏梅丸治蟲痛方見傷寒蘇合香丸治注痛拙著從衆録有方論又鬼注不去宜虎骨鹿茸羚羊角龍骨各三錢以羊肉湯煎入麝香少許服取腥膻之味引濁陰之氣從陰而泄此喻嘉言寓意草法也香蘇飲治氣痛一切感冒俱佳香附二錢制研紫蘇葉三錢陳皮甘草各一錢加生薑五片水二杯煎八分服心痛加元胡二錢酒一盞七氣湯亦名四七湯治七情之氣鬱逆半夏厚朴茯苓各三錢紫蘇葉一錢加生薑三片水二杯煎八分服百合湯治心口痛諸藥不效亦屬氣痛百合一兩烏藥三錢水二杯煎八分服此方余自海壇得來失笑散治一切血滯作痛如神五靈脂醋炒蒲黃各一兩共研末每服三錢以醋湯送下日二服桃仁承氣湯治心腹痛大便不通其人如狂屬死血桂枝二錢桃仁十七枚去皮尖大黃四錢芒硝七分甘草七分水二杯煎八分去滓入硝二沸溫服丹參飲治心胸諸痛神驗婦人更宜亦屬血痛亦可通治諸痛丹參一兩白檀香要真者極香的切片砂仁各一錢水二杯煎八分服妙香散方見遺精平胃散治一切飲食停滯蒼朮厚朴炒陳皮各二錢甘草一錢加生薑五片水二杯煎八分服肉積加山楂面積加麥芽萊蔔子谷積加穀芽酒積加葛根砂仁二陳湯方見中風十棗湯治水飲作痛峻劑不可輕用大戟芫花炒甘遂各等分研末用大棗十枚水二杯煎七分去滓入藥方寸匕約有七分服次早當下未下再一服服後體虛以稀粥調養理中湯治冷痛方見傷寒吳茱萸湯仲景治冷痛通治食谷欲嘔頭痛如破煩躁欲死者及大吐不已之症吳茱萸二錢五分湯泡人參一錢五分大棗五枚生薑三錢切片水二杯煎八分溫服金鈴子散治心口痛及脅痛腹痛如神屬熱者金鈴子去核元胡索各二兩研末每服三錢黃酒送下厚朴三物湯金匱治心腹實痛大便閉者厚朴四錢大黃二錢枳實一錢五分水二杯煎八分溫服厚朴七物湯金匱即前方加桂枝甘草各一錢五分生薑二錢五分大棗五枚水二杯煎八分服嘔者加半夏一錢寒多者加生薑一錢五分附子粳米湯金匱治腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子二錢制半夏四錢炙草一錢粳米五錢布包大棗一枚水二杯煎八分溫服日夜作三服大黃附子湯金匱脅下偏痛發熱脈緊弦者大黃附子各二錢細辛一錢水二杯煎八分服當歸生薑羊肉湯金匱治心腹諸痛虛極諸藥不效者一服如神及脅痛裡急婦人産後腹中㽲痛當歸七錢五分生薑一兩二錢五分羊肉四兩去筋膜用藥戥稱方准水五杯煎取二杯溫服一杯一日兩服若寒多者加生薑五錢痛多而嘔者加橘皮五錢白朮二錢五分栝蔞薤白白酒湯金匱治胸痹喘息咳唾胸背痛寸沉遲關上小緊栝蔞連皮子搗五錢薤白如干者用三錢生者用六錢白酒三杯煎八分服加半夏二錢名栝蔞薤白半夏湯治胸痹不得臥心痛徹背大建中湯金匱治胸大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛不可觸近川椒二錢微炒出汗乾薑四錢人參三錢水二鍾煎一鍾去滓入膠飴四錢煎取八分溫服如一炊頃可食熱粥半碗隔食反胃方左歸飲景嶽即六味湯去丹皮澤瀉加枸杞炙草啓隔飲心悟治食入即吐川貝母一錢五分切片不研沙參三錢丹參二錢川鬱金五分乾荷蒂三個砂仁殼四分杵頭糠二錢布包茯苓一錢五分石菖蒲四分水二杯煎八分服大半夏湯金匱治反胃人參二錢半夏四錢俗用明礬制者不可用只用姜水浸二日一日一換清水浸三日一日一換攄起蒸熟曬乾切片用長流水入蜜揚二百四十遍取三杯半煎七分服吳茱萸湯方見心腹痛六君子湯此方為補脾健胃祛痰進食之通劑百病皆以此方收功人參白朮炒茯苓半夏各二錢陳皮炙草各一錢加生薑五片大棗二枚水二杯煎八分服治反胃宜加附子二錢丁香藿香砂仁各一錢附子理中湯治反胃即理中湯加附子三錢治反胃加茯苓四錢甘草減半附隔食方法人鏡經曰內經云三陽結謂之隔蓋足太陽膀胱經水道不行手太陽小腸經津液枯槁足陽明胃經燥糞結聚所以飲食拒而不入縱入太倉還出喉嚨夫腸胃一日一便乃常度也今五七日不便陳物不去新物不納宜用三一承氣湯節次下之後用脂麻飲啜之陳腐去而腸胃潔癥瘕盡而營衛昌飲食自進矣三一承氣湯大黃芒硝甘草厚朴枳實各一錢水二杯煎八分服按此方太峻姑存之以備參考氣喘方蘇子降氣湯治上盛下虛氣喘等證紫蘇子二錢微炒前胡當歸半夏陳皮厚朴各一錢沉香炙草各五分加生薑三片大棗二枚水二杯煎八分服葶藶大棗瀉肺湯金匱治支飲滿而肺氣閉氣閉則呼吸不能自如用此苦降以泄實邪葶藶子隔紙炒研如泥二錢二分水一杯半大棗十二枚煎七分入葶藶子服之十棗湯方見心腹痛小青龍湯方見傷寒貞元飲景嶽陰血為陽氣之依歸血虛則氣無所依時或微喘婦人血海常虛多有此症景嶽方意在濟之緩之四字濟之以歸地緩之以甘草頗有意義今人加紫石英黑鉛之重鎮則失緩之之義加沉香白芥子之辛香則失濟之之義矣且此方非為元氣奔脫而設時醫每遇大喘之症必以此方大劑與服氣升則火升偶得濡潤之藥氣亦漸平一晌旋而陰柔之性與飲水混為一家則胸膈間純是陰霾之氣其人頃刻歸陰矣吾鄉潘市醫倡此法以局人神智無一人悟及誠可痛恨熟地黃五七錢或一二兩當歸身三四錢炙草一二三錢水三四杯煎八分服苓桂朮甘湯金匱治氣短喻嘉言云此治呼氣短茯苓四錢白朮桂枝各二錢炙草一錢五分水二杯煎八分服腎氣丸金匱治氣短喻嘉言云此治吸氣短即八味地黃丸但原方系乾生地黃桂枝茯苓甘草大棗湯仲景治氣喘臍下動氣欲作奔豚茯苓六錢桂枝甘草炙各二錢大棗四枚用甘瀾水三杯半先煎茯苓至二杯入諸藥煎七分服作甘瀾水法取長流水揚之數百遍或千遍愈妙真武湯仲景鎮水逆定痰喘之神劑茯苓芍藥生薑切各三兩白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服宜倍茯苓咳嗽甚者去生薑加乾薑一錢五分五味細辛各一錢黑錫丹治脾腎虛冷上實下虛奔豚五種水氣中風痰潮危急喻嘉言曰凡遇陰火逆沖真陽暴脫氣喘痰鳴之急症舍此方再無他法可施豫每用小囊佩帶隨身恐遇急症不及取藥且欲吾身元氣溫養其藥藉手效靈厥功歷歷可紀即痘症倒塌逆候服此亦可回生沉香附子炮胡蘆巴肉桂各一錢小茴香補骨脂肉豆蔻木香金鈴子去核各一兩硫黃黑鉛與硫黃炒成砂子各三兩上為末酒煮麵糊丸梧子大陰乾以布袋擦令光瑩每服四五十丸薑湯送下血症方麻黃人參芍藥湯東垣治吐血外感寒邪內虛蘊熱桂枝五分補表虛麻黃去外寒黃耆實表益衛炙甘草補脾白芍安太陰人參益元氣而實表麥冬補肺氣各三分五味子五粒安肺氣當歸五分和血養血水煎熱服按此方以解表為止血是東垣之巧思幸中非有定識也觀其每味自注藥性俱悖聖經便知其陋甘草乾薑湯金匱炙甘草四錢乾薑二錢炮水二杯煎八分服柏葉湯金匱治吐血不止柏葉生用三錢無生者用乾者二錢乾薑一錢艾葉生用二錢如無生者用乾者一錢水四杯取馬通二杯煎一杯服如無馬通以童便二杯煎八分服黃土湯金匱治先便後血為遠血亦治衄血吐血血不止灶心黃土八錢原方四錢生地黃芩甘草阿膠白朮附子炮各一錢五分水三杯煎八分服赤小豆散金匱治先血後便為近血赤小豆浸令出芽曬乾一兩當歸四錢共研末每服三錢漿水下即洗米水三日後有酸味是也按凡止血標藥可隨宜作引血餘灰可用一二兩同煎諸血皆驗梔子茜草干側柏治上血槐花生地黃烏梅續斷治血崩凡下血及血痢口渴後重脈洪有力者為火盛可用苦參子去殼仁勿破外以龍眼肉包之空腹以倉米湯送下九粒一日二三服漸加至十四粒二日效水腫方五皮飲此方出華元化中藏經以皮治皮不傷中氣所以為治腫通用之劑大腹皮酒洗桑白皮生各三錢雲苓皮四錢陳皮三錢生薑皮一錢水三杯煎八分溫服上腫宜發汗加紫蘇葉荊芥各二錢防風一錢杏仁一錢五分下腫宜利小便加防己二錢木通赤小豆各一錢三分喘而腹脹加生萊蔔子杏仁各二錢小便不利者為陽水加赤小豆防己地膚子小便自利者為陰水加白朮二錢蒼朮川椒各一錢五分熱加海蛤三錢知母一錢五分寒加附子乾薑各二錢肉桂一錢嘔逆加半夏生薑各二錢腹痛加白芍一錢桂枝一錢炙甘草一錢導水茯苓湯治水腫頭面手足遍身腫如爛瓜之狀按而塌陷胸腹喘滿不能轉側安睡飲食不下小便祕澀溺出如割或如黑豆汁而絶少服喘嗽氣逆諸藥不效者用此即漸利而愈澤瀉赤茯苓麥門冬去心白朮各二兩桑白皮紫蘇檳榔木瓜各一兩大腹皮陳皮砂仁木香各七錢五分上㕮咀每服一二兩水二杯燈草三十根煎八分食遠服如病重者可用藥二兩又加麥冬及燈草半兩以水一斗於砂鍋內熬至一大碗再下小鍋內煎至一鍾五更空心服加減金匱腎氣丸治脾腎兩虛腫勢漸大喘促不眠等證熟地四兩雲茯苓三兩肉桂牛膝丹皮山藥澤瀉車前子山茱萸各二兩附子五錢研末煉蜜丸如桐子大每服三錢燈草湯送下一日兩服以兩為錢水煎服名加減金匱腎氣湯但附子必倍用方效加川椒目一錢五分巴戟天二錢治腳面腫風水因風而病水也防己黃耆湯金匱治風水脈浮身重汗出惡風防己三錢炙草一錢五分白朮二錢黃耆三錢生薑四片大棗一枚水二杯煎八分服服後如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令微汗瘥喘者加麻黃胃中不和者加芍藥氣上衝者加桂枝虛汗自出故不用麻黃以散之只用防己以驅之服後身如蟲行及腰下如冰云云皆濕下行之徵也然非耆朮甘草焉能使衛氣復振而驅濕下行哉越婢湯金匱治惡風一身悉腫脈浮不渴續自汗出無大熱者麻黃六錢石膏八錢甘草二錢生薑三錢大棗五枚水四杯先煮麻黃至三杯去沫入諸藥煎八分服日夜作三服惡風者加附子一錢風水加白朮三錢前云身重為濕多此云一身悉腫為風多風多氣多熱亦多且屬急風故用此猛劑杏子湯脈浮者為風水發其汗即已方闕或云即甘草麻黃湯加杏仁皮水水行於皮中也其脈浮外證跗腫按之沒指曰不惡風者不兼風也曰其腹如鼓者外有脹形內不堅滿也曰不渴者病不在內也曰當發其汗者以水在皮宜汗也防己茯苓湯金匱治四肢腫水在皮中聶聶動者防己桂枝黃耆各三錢茯苓六錢炙草一錢水三杯煎八分服日夜作三服藥亦同防己黃耆湯但去朮加桂苓者風水之濕在經絡近內皮水之濕在皮膚近外故但以苓協桂滲周身之濕而不以術燥其中氣也不用薑棗者濕不在上焦之營衛無取乎宣之也蒲灰散金匱厥而為皮水者此主之腫甚而潰之逆證厥之為言逆也蒲灰半斤滑石一斤為末飲服方寸匕日三服愚按當是外敷法然利濕熱之劑亦可內服外摻也越婢加朮湯金匱里水此主之甘草麻黃湯亦主之按里水當是皮水筆誤也或水在皮里即皮水之重者亦未可知方見風水甘草麻黃湯甘草四錢麻黃二錢水二杯先煮麻黃至一杯半去沫入甘草煮七分服重覆汗出不汗再服慎風寒二藥上宣肺氣中助土氣外行水氣正水水之正伏也其脈遲者水屬陰也外證自喘者陰甚於下不復與胸中之陽氣相調水氣格陽而喘也其目窠如蠶兩脛腫大諸證金匱未言無不俱見愚按正水金匱未出方然提綱云脈沉遲外證自喘則真武湯小青龍湯皆正治之的方越婢加附子湯麻黃附子湯亦變證之備方桂甘麻辛附子湯加生桑皮五錢黑豆一兩為窮極之巧方此正水之擬治法也石水謂下焦水堅如石也其脈自沉外證少腹滿不喘麻黃附子湯麻黃三錢炙草二錢附子一錢水二杯先煮麻黃至一杯半去沫入諸藥煎七分溫服日作三服此即麻黃附子甘草湯分兩略異即以溫經散寒之法變為溫經利水之妙黃汗汗出沾衣而色黃也汗出入水水邪傷心或汗出當風所致汗與水皆屬水氣因其入而內結則鬱熱而黃其脈沉而遲外證身發熱四肢頭面腫久不愈必致癰膿黃耆桂枝芍藥苦酒湯金匱治身體腫發熱汗出而渴狀如風水汗出沾衣色正黃如柏汁脈自沉風水脈浮黃汗脈沉以汗出入水中浴水從毛孔入得之水氣從毛孔入而傷其心故水火相侵而色黃水氣搏結而脈沉也凡看書宜活看此證亦有從酒後汗出當風所致者雖無外水而所出之汗因風內返亦是水凡脾胃受濕濕久生熱濕熱交蒸而成黃色皆可以汗出入水之意悟之黃耆五錢芍藥桂枝各三錢苦酒一杯半水一杯煎八分溫服當心煩至六七日乃解汗出於心苦酒止之太急故心煩至六七日正復而邪自退也桂枝加黃耆湯金匱黃汗之病兩脛自冷盜汗出汗已反發熱久久身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上汗出下無汗腰臗弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利以上皆黃汗之變證師備擬之以立治法茲因集隘不能全録只輯其要此為黃汗言變證雖多而其源總由水氣傷心所致結此一句見治法不離其宗桂枝芍藥生薑各三錢甘草炙黃耆各二錢大棗四枚水三杯煮八分溫服須臾啜熱粥一杯余以助藥力溫覆取微汗若不汗更服前方止汗是治黃汗之正病法此方令微汗是治黃汗之變症法脹滿蠱脹方七氣湯治實脹屬七情之氣者方見心腹痛胃苓散消脹行水蒼朮一錢五分炒白朮厚朴各一錢五分桂枝一錢陳皮澤瀉豬苓各一錢五分炙草七分茯苓四錢加生薑五片水三杯煎八分服去桂草以煨半熟蒜頭搗為丸陳米湯下三四錢一日兩服更妙厚朴三物湯厚朴七物湯二方俱見腹痛桂甘薑棗麻辛附子湯金匱治氣分心下堅大如盤邊如旋杯桂枝生薑各三錢甘草麻黃細辛各二錢附子一錢大棗三枚水三杯先煮麻黃至二杯去沫入諸藥煎八分溫服日夜作三服當汗出如蟲行皮上即愈此症是心腎不交病上不能降下不能升日積月纍如鐵石難破方中桂甘薑棗以和其上而復用麻黃細辛附子少陰的劑以治其下庶上下交通而病愈所謂大氣一轉其氣乃散也枳朮湯金匱治心下堅大如盤如盤而不如杯邪尚散漫未結雖堅大而不滿痛也水飲所作與氣分有別也氣無形以辛甘散之水有形以苦泄之枳實二錢白朮四錢水二杯煎八分服日夜作三服腹中軟即止禹餘糧丸三因治十腫水氣腳膝腫上氣喘急小便不利但是水氣悉皆主之許學士及丹溪皆云此方治臌脹之要藥蛇含石大者三兩以新鐵銚盛入炭火中燒石與銚子一般紅用鉗取石傾入醋中候冷取出研極細禹餘糧石三兩真針砂五兩先以水淘淨炒乾入餘糧一處用米醋二升就銚內煮醋乾為度後用銚並藥入炭中燒紅鉗出傾藥淨磚地上候冷研細以三物為主其次量人虛實入下項治水妙在轉輸此方三物既非大戟甘遂芫花之比又有下項藥扶持故虛人老人亦可服羌活木香茯苓川芎牛膝酒浸桂心蓬朮青皮附子炮乾薑炮白豆蔻炮大茴香炒京三稜炮白蒺藜當歸酒浸一宿各半兩上為末入前藥拌勻以湯浸蒸餅捩去水和藥再杵極勻丸如桐子大食前溫酒白湯送下三十丸至五十丸最忌鹽一毫不可入口否則發疾愈甚但試服藥即於小便內旋去不動臟腑病去日日三服兼以溫和調補氣血藥助之真神方也此方昔人用之屢效以其大能暖水藏也服此丸更以調補氣血藥助之不為峻也暑症方六一散河間治一切暑病滑石六兩甘草一兩研末每服三錢井花水下或燈草湯下白虎湯仲景治傷暑大渴大汗之證方見傷寒加人參者以暑傷元氣也加蒼朮者治身熱足冷以暑必挾濕也香薷飲治傷暑發熱身痛口燥舌乾吐瀉甘草一錢厚朴一錢五分扁豆二錢香薷四錢水二杯煎八分冷服或溫服瀉利加茯苓白朮嘔吐加半夏暑氣發搐加羌活秦艽大順散治陰暑即畏熱貪涼之病乾薑一錢炒甘草八分炒杏仁去皮尖六分炒肉桂六分共為細末每服三錢水一杯煎七分服如煩躁井花水調下一錢生脈散卻暑良方人參一錢麥冬三錢五味一錢水一杯煎七分服清暑益氣湯東垣炙耆一錢五分人參白朮蒼朮青皮陳皮麥冬豬苓黃柏各五分乾葛澤瀉各二錢神麯八分炙草五味各三分升麻三分歸身三分加生薑三片大棗二枚水二杯煎七分服一物瓜蒂湯金匱瓜蒂二十個水二杯煎八分服泄瀉方胃苓散方見脹滿加減詳三字經注四神丸治脾腎虛寒五更泄瀉補骨脂四兩酒炒肉豆蔻麵煨去油吳茱萸泡五味炒各二兩用紅棗五兩生薑五兩同煮去姜將棗去皮核搗爛為丸如桐子大每日五更服三錢臨臥服三錢米湯下加白朮附子罌粟人參更效生薑瀉心湯黃連湯甘草瀉心湯半夏瀉心湯乾薑黃芩黃連人參湯厚朴生薑半夏甘草人參湯以上六方俱見傷寒論讀按以上諸法與內經中熱消疸則便寒寒中之屬則便熱一節揆脈證而擇用甚驗張石頑醫通載之甚詳但古調不彈久矣余新悟出一方有瀉心之意上可消痞下可止瀉腸熱胃寒能分走而各盡其長非有他方即傷寒厥陰條之烏梅丸也屢用屢驗
